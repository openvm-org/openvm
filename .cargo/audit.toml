[advisories]
  ignore = [
  # an older version of tracing-subscriber 0.2.25 is used in ark-bn254 but it is an optional dependency that is not included in the crate graph even with all features enabled
  # unfortunately cargo audit includes optional dependencies from Cargo.lock even if they are not in the crate graph
  "RUSTSEC-2025-0055",
  # quick-xml 0.39 (RUSTSEC-2026-0194, RUSTSEC-2026-0195) and quinn-proto 0.11.14
  # (RUSTSEC-2026-0185) are optional dependencies present only in Cargo.lock and
  # not in the resolved crate graph (`cargo tree -i` finds no dependents); the
  # fixed versions are semver-incompatible for the crates that list them.
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
  "RUSTSEC-2026-0185",
  ]
