[advisories]
  ignore = [
  # an older version of tracing-subscriber 0.2.25 is used in ark-bn254 but it is an optional dependency that is not included in the crate graph even with all features enabled
  # unfortunately cargo audit includes optional dependencies from Cargo.lock even if they are not in the crate graph
  "RUSTSEC-2025-0055",
  # all host ruint dependencies have been updated to >=1.17.1.
  # the guest library ruint patch is currently pinned to 1.14 and will be updated in a future release.
  # TODO: remove these ignores once the forked guest library ruint patch is removed or updated.
  # - RUSTSEC-2025-0137 concerns undefined behavior (UB) which may trigger memory corruption in a previously marked safe function `reciprocal_mg10`. The upstream fix is to change the safe function to `unsafe`.
  # - RUSTSEC-2026-0176 and RUSTSEC-2026-0177 concern pyo3, which is only present through ruint's optional `pyo3` feature in Cargo.lock and is not in the default crate graph.
  # - these advisories do not affect correctness of existing code.
  "RUSTSEC-2025-0137",
  "RUSTSEC-2026-0176",
  "RUSTSEC-2026-0177"
  ]
