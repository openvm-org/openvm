[package]
name = "openvm-cli-example-string-utils"
version = "0.0.0"
edition = "2021"

[dependencies]
openvm = { path = "../../../../../toolchain/openvm" }

[[bin]]
name = "string-utils"
path = "src/main.rs"

[[example]]
name = "palindrome"
path = "examples/palindrome.rs"

[features]
default = []
std = ["openvm/std"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(openvm_intrinsics)'] }
