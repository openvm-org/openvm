[package]
name = "openvm-cli-example-calculator"
version = "0.0.0"
edition = "2021"

[dependencies]
openvm = { path = "../../../../../toolchain/openvm" }

[lib]
name = "calculator"
path = "src/lib.rs"

[[bin]]
name = "calculator"
path = "src/main.rs"

[[example]]
name = "fibonacci"
path = "examples/fibonacci.rs"

[features]
default = []
std = ["openvm/std"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(openvm_intrinsics)'] }
