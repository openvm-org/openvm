[package]
name = "rvr-openvm-tests"
description = "Cross-cutting integration tests for rvr-openvm (not tied to a single extension)"
version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
publish = false

[lib]
path = "src/lib.rs"

[dev-dependencies]
rvr-openvm.workspace = true
rvr-openvm-ir.workspace = true
rvr-openvm-lift.workspace = true

openvm-circuit = { workspace = true, features = ["test-utils"] }
openvm-instructions.workspace = true
openvm-platform.workspace = true
openvm-rv32im-transpiler.workspace = true
openvm-stark-sdk = { workspace = true, features = ["cpu-backend"] }
openvm-transpiler.workspace = true

eyre.workspace = true
tempfile.workspace = true

[features]
default = []
rvr = ["openvm-circuit/rvr"]
