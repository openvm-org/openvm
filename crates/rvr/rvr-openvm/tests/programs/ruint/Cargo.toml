[workspace]
[package]
name = "rvr-openvm-int256-test-programs"
version = "0.0.0"
edition = "2021"

[dependencies]
openvm = { path = "../../../../../openvm/crates/toolchain/openvm" }
ruint = { git = "https://github.com/openvm-org/uint.git", branch = "v1.14.0-openvm", default-features = false, features = [
    "num-traits",
] }
num-traits = { version = "0.2.19", default-features = false }

[features]
default = []
std = ["openvm/std"]

[profile.release]
panic = "abort"
lto = "thin"
