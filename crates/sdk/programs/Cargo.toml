[workspace]
[package]
name = "openvm-sdk-test-programs"
version = "0.0.0"
edition = "2021"

[dependencies]
openvm = { path = "../../toolchain/openvm", default-features = false }
openvm-deferral-guest = { path = "../../../extensions/deferral/guest", default-features = false }
openvm-verify-stark-guest = { path = "../../../guest-libs/verify-stark/guest", default-features = false }

[features]
default = []
std = ["openvm/std"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(openvm_intrinsics)'] }

[profile.release]
panic = "abort"
lto = "thin"
