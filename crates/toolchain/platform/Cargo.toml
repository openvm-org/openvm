[package]
name = "openvm-platform"
description = "OpenVM Rust platform definitions."
version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
openvm-custom-insn.workspace = true
openvm-riscv-guest.workspace = true

# This crate should have as few dependencies as possible so it can be
# used as many places as possible to share the platform definitions.
[target.'cfg(target_arch = "riscv64")'.dependencies]
# Provides a no-op `critical-section` impl for the guest so `portable-atomic`'s
# CAS polyfill (used by `once_cell`, `spin`, etc.) doesn't emit CSR interrupt
# instructions the openvm transpiler can't handle. Always pulled in on the
# riscv64 target; the impl itself is `cfg(openvm_intrinsics)`-gated.
critical-section = { version = "1.1.2" }
embedded-alloc = { version = "0.6.0", features = [
    "allocator_api",
], optional = true }
libm = { version = "0.2", optional = true }

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]
features = ["rust-runtime", "panic-handler", "export-libm", "export-pal-abi"]

[features]
default = []
entrypoint = []
export-libm = ["dep:libm"]
heap-embedded-alloc = [
    "dep:embedded-alloc",
    "rust-runtime",
]
panic-handler = []
# Build a rust runtime
rust-runtime = ["export-libm"]
std = []

[lints]
workspace = true
