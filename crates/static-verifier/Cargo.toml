[package]
name = "openvm-static-verifier"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
halo2-base = { workspace = true, features = ["halo2-axiom"] }
openvm-stark-sdk = { workspace = true, features = ["baby-bear-bn254-poseidon2"] }
num-bigint = { workspace = true }
zkhash = { workspace = true }
rand_chacha = { workspace = true }
serde = { workspace = true }
snark-verifier-sdk = { workspace = true, features = ["loader_evm"], optional = true }
serde_with = { workspace = true, features = ["hex"], optional = true }

[dev-dependencies]
openvm-stark-backend = { workspace = true, features = ["test-utils"] }
openvm-stark-sdk = { workspace = true, features = ["cpu-backend"] }

[features]
default = []
evm-prove = ["dep:snark-verifier-sdk", "dep:serde_with"]
evm-verify = ["evm-prove"]
