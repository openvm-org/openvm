[package]
name = "openvm-mod-circuit-builder"
description = "Modular arithmetic framework for building OpenVM circuits."
version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
openvm-stark-backend = { workspace = true }
openvm-circuit-primitives = { workspace = true }
openvm-stark-sdk = { workspace = true, features = ["cpu-backend"] }
openvm-circuit = { workspace = true }
openvm-instructions = { workspace = true }
halo2curves-axiom = { workspace = true, optional = true }
openvm-pairing-guest = { workspace = true, optional = true }
openvm-cuda-backend = { workspace = true, optional = true }
openvm-cuda-common = { workspace = true, optional = true }

rand.workspace = true
rand08 = { package = "rand", version = "0.8.5", features = ["std_rng"] }
num-bigint.workspace = true
num-traits.workspace = true
tracing.workspace = true
itertools.workspace = true

[dev-dependencies]
openvm-circuit-primitives = { workspace = true }
openvm-pairing-guest = { workspace = true, features = ["halo2curves"] }
halo2curves-axiom = { workspace = true }
openvm-circuit = { workspace = true, features = ["test-utils"] }
rand08 = { package = "rand", version = "0.8.5", features = ["std_rng"] }

[build-dependencies]
openvm-cuda-builder = { workspace = true, optional = true }

[features]
default = []
cuda = [
    "dep:openvm-cuda-builder",
    "dep:openvm-cuda-common",
    "dep:openvm-cuda-backend",
    "openvm-circuit-primitives/cuda",
    "openvm-circuit/cuda",
]
aot = ["openvm-circuit/aot"]
parallel = ["openvm-stark-backend/parallel", "openvm-circuit/parallel"]
test-utils = [
    "dep:halo2curves-axiom",
    "dep:openvm-pairing-guest",
    "openvm-circuit/test-utils",
]
