[package]
name = "openvm-keccak256-circuit"
description = "OpenVM circuit extension for keccak256"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
openvm-stark-backend = { workspace = true }
openvm-cpu-backend = { workspace = true }
openvm-stark-sdk = { workspace = true, features = ["cpu-backend"] }
openvm-cuda-backend = { workspace = true, optional = true }
openvm-cuda-common = { workspace = true, optional = true }
openvm-circuit-primitives = { workspace = true }
openvm-circuit-primitives-derive = { workspace = true }
openvm-circuit = { workspace = true }
openvm-circuit-derive = { workspace = true }
openvm-instructions = { workspace = true }
openvm-riscv-circuit = { workspace = true }
openvm-keccak256-transpiler = { workspace = true }
rvr-openvm-lift = { workspace = true, optional = true }
rvr-openvm-ext-keccak = { workspace = true, optional = true }

p3-keccak-air = { workspace = true }

strum.workspace = true
tiny-keccak.workspace = true
itertools.workspace = true
derive-new.workspace = true
derive_more = { workspace = true, features = ["from"] }
rand.workspace = true
serde.workspace = true

[dev-dependencies]
openvm-stark-sdk = { workspace = true, features = ["cpu-backend"] }
openvm-circuit = { path = "../../../crates/vm", default-features = false, features = ["test-utils"] }
openvm-riscv-transpiler = { workspace = true }

[build-dependencies]
openvm-cuda-builder = { workspace = true, optional = true }

[features]
default = ["parallel", "jemalloc"]
parallel = ["openvm-circuit/parallel"]
test-utils = ["openvm-circuit/test-utils"]
tco = ["openvm-riscv-circuit/tco"]
rvr = [
    "dep:rvr-openvm-lift",
    "dep:rvr-openvm-ext-keccak",
    "openvm-riscv-circuit/rvr",
]
# performance features:
mimalloc = ["openvm-circuit/mimalloc"]
jemalloc = ["openvm-circuit/jemalloc"]
jemalloc-prof = ["openvm-circuit/jemalloc-prof"]
cuda = [
    "dep:openvm-cuda-backend",
    "dep:openvm-cuda-common",
    "dep:openvm-cuda-builder",
    "openvm-circuit-primitives/cuda",
    "openvm-circuit/cuda",
    "openvm-riscv-circuit/cuda",
]
touchemall = [
    "cuda",
    "openvm-circuit/touchemall",
    "openvm-circuit-primitives/touchemall",
    "openvm-riscv-circuit/touchemall",
]
