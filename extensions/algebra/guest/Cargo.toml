[package]
name = "openvm-algebra-guest"
description = "OpenVM guest library for algebra over rings and fields, including modular and complex field arithmetic."
version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
openvm-algebra-moduli-macros = { workspace = true }
openvm-algebra-complex-macros = { workspace = true }
openvm-riscv-guest = { workspace = true }
openvm-custom-insn = { workspace = true }
serde-big-array.workspace = true
strum_macros.workspace = true
# `portable-atomic` feature routes `once_cell::race` CAS through `portable-atomic`;
# stock `riscv64im-unknown-none-elf` has `atomic-cas: false` so `core::sync::atomic` CAS doesn't compile.
once_cell = { workspace = true, features = ["race", "alloc", "portable-atomic"] }
portable-atomic = { workspace = true }

# SAFETY: `unsafe-assume-single-core` is sound because the openvm guest is
# single-threaded; drop this feature if that ever changes.
[target.'cfg(all(target_arch = "riscv64", target_os = "none"))'.dependencies]
portable-atomic = { workspace = true, features = ["unsafe-assume-single-core"] }

[target.'cfg(not(all(target_arch = "riscv64", target_os = "none")))'.dependencies]
num-bigint.workspace = true
halo2curves-axiom = { workspace = true, optional = true }

[dev-dependencies]

[features]
default = []
halo2curves = ["dep:halo2curves-axiom"]
