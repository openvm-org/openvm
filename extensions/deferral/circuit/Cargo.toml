[package]
name = "openvm-deferral-circuit"
description = "OpenVM circuit extension for deferral instructions"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
openvm-stark-backend = { workspace = true }
openvm-stark-sdk = { workspace = true, features = ["cpu-backend"] }
openvm-cpu-backend = { workspace = true }
openvm-circuit-primitives = { workspace = true }
openvm-circuit-primitives-derive = { workspace = true }
openvm-poseidon2-air = { workspace = true }
openvm-circuit = { workspace = true }
openvm-circuit-derive = { workspace = true }
openvm-instructions = { workspace = true }
openvm-rv32im-circuit = { workspace = true }
openvm-deferral-transpiler = { workspace = true }
rvr-openvm-lift = { workspace = true, optional = true }
rvr-openvm-ext-deferral = { workspace = true, optional = true }
rvr-openvm-ext-ffi-common = { workspace = true, optional = true }

openvm-cuda-backend = { workspace = true, optional = true }
openvm-cuda-common = { workspace = true, optional = true }

p3-field = { workspace = true }
itertools.workspace = true
derive-new.workspace = true
derive_more = { workspace = true, features = ["from"] }
rand.workspace = true
serde.workspace = true
cfg-if.workspace = true
dashmap.workspace = true
rustc-hash.workspace = true

[build-dependencies]
openvm-cuda-builder = { workspace = true, optional = true }

[dev-dependencies]
openvm-stark-sdk = { workspace = true, features = ["cpu-backend"] }
openvm-circuit = { path = "../../../crates/vm", default-features = false, features = ["test-utils"] }

[features]
default = ["parallel", "jemalloc"]
tco = ["openvm-circuit/tco"]
aot = ["openvm-circuit/aot"]
rvr = [
    "dep:rvr-openvm-lift",
    "dep:rvr-openvm-ext-deferral",
    "dep:rvr-openvm-ext-ffi-common",
    "openvm-rv32im-circuit/rvr",
]
jemalloc = ["openvm-circuit/jemalloc"]
parallel = ["openvm-circuit/parallel"]
test-utils = ["openvm-circuit/test-utils"]
cuda = [
    "dep:openvm-cuda-backend",
    "dep:openvm-cuda-common",
    "dep:openvm-cuda-builder",
    "openvm-circuit-primitives/cuda",
    "openvm-circuit/cuda",
    "openvm-rv32im-circuit/cuda",
]
touchemall = [
    "cuda",
    "openvm-circuit/touchemall",
    "openvm-circuit-primitives/touchemall",
    "openvm-cuda-backend/touchemall",
    "openvm-cuda-common/touchemall",
    "openvm-rv32im-circuit/touchemall",
]
