[package]
name = "openvm-ecc-integration-tests"
description = "Integration tests for the OpenVM ecc extension"
publish = false
version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
openvm-stark-sdk.workspace = true
openvm-circuit = { workspace = true, features = ["test-utils"] }
openvm-instructions.workspace = true
openvm-transpiler.workspace = true
openvm-algebra-transpiler.workspace = true
openvm-ecc-transpiler.workspace = true
openvm-ecc-circuit.workspace = true
openvm-riscv-transpiler.workspace = true
openvm-toolchain-tests = { path = "../../../crates/toolchain/tests" }
openvm-sdk.workspace = true
openvm-sdk-config.workspace = true
serde.workspace = true
serde_with.workspace = true
eyre.workspace = true
hex-literal.workspace = true
num-bigint.workspace = true
halo2curves-axiom = { workspace = true }

[features]
default = ["parallel"]
parallel = ["openvm-circuit/parallel"]
tco = ["openvm-ecc-circuit/tco"]
rvr = ["openvm-ecc-circuit/rvr", "openvm-sdk/rvr"]
cuda = ["openvm-ecc-circuit/cuda", "openvm-sdk/cuda"]
touchemall = ["cuda", "openvm-ecc-circuit/touchemall"]
