[package]
name = "openvm-ecc-guest"
description = "OpenVM guest library for elliptic curve cryptography"
version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
openvm = { workspace = true }
serde = { workspace = true }
strum_macros.workspace = true
ecdsa-core = { workspace = true, features = ["verifying"] }
elliptic-curve = { workspace = true, features = ["arithmetic", "sec1"] }
openvm-custom-insn = { workspace = true }
openvm-riscv-guest = { workspace = true }
openvm-algebra-guest = { workspace = true }
openvm-ecc-sw-macros = { workspace = true }
# `portable-atomic` feature routes `once_cell::race` CAS through `portable-atomic`;
# stock `riscv64im-unknown-none-elf` has `atomic-cas: false` so `core::sync::atomic` CAS doesn't compile.
once_cell = { workspace = true, features = ["race", "alloc", "portable-atomic"] }

# Used for `halo2curves` feature
halo2curves-axiom = { workspace = true, optional = true }
group = "0.13.0"

[features]
default = []
halo2curves = ["dep:halo2curves-axiom", "openvm-algebra-guest/halo2curves"]
std = ["alloc"]
alloc = []

[package.metadata.cargo-shear]
ignored = [
    "openvm",
    "openvm-custom-insn",
    "openvm-riscv-guest",
    "halo2curves-axiom",
]

[lints]
workspace = true
