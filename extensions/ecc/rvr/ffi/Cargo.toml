[package]
name = "rvr-openvm-ext-ecc-ffi"
description = "ECC staticlib for rvr-openvm-ext-ecc"
version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[lib]
crate-type = ["staticlib"]

[dependencies]
# Shared helpers (read_field_256/write_field_256/etc.) live in
# rvr-openvm-ext-algebra-ffi-common (rlib). K-256 EC ops live in the modular
# staticlib (via libsecp256k1) so this crate does not redefine them.
rvr-openvm-ext-algebra-ffi-common.workspace = true
rvr-openvm-ext-ffi-common.workspace = true

openvm-circuit-primitives.workspace = true
openvm-ecc-circuit.workspace = true
openvm-mod-circuit-builder.workspace = true

blstrs.workspace = true
halo2curves-axiom.workspace = true
num-bigint.workspace = true
