[package]
name = "openvm-pairing-circuit"
description = "OpenVM circuit extension for elliptic curve pairing"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
openvm-circuit-primitives = { workspace = true }
openvm-circuit-derive = { workspace = true }
openvm-circuit = { workspace = true }
openvm-ecc-guest = { workspace = true }
openvm-pairing-guest = { workspace = true, features = [
    "halo2curves",
    "bls12_381",
    "bn254",
    "blst"
] }
openvm-instructions = { workspace = true }
openvm-mod-circuit-builder = { workspace = true }
openvm-stark-backend = { workspace = true }
openvm-cpu-backend = { workspace = true }
openvm-riscv-circuit = { workspace = true }
openvm-algebra-circuit = { workspace = true }
openvm-ecc-circuit = { workspace = true }
openvm-pairing-transpiler = { workspace = true }
rvr-openvm-lift = { workspace = true, optional = true }
rvr-openvm-ext-pairing = { workspace = true, optional = true }
openvm-cuda-backend = { workspace = true, optional = true }
openvm-stark-sdk = { workspace = true, optional = true, features = ["cpu-backend"] }

num-bigint = { workspace = true }
num-traits = { workspace = true }
strum = { workspace = true }
derive_more = { workspace = true }
derive-new = { workspace = true }
rand = { workspace = true }
eyre = { workspace = true }
serde = { workspace = true, features = ["derive", "std"] }
cfg-if = { workspace = true }

halo2curves-axiom = { workspace = true }

[dev-dependencies]
openvm-algebra-transpiler.workspace = true
openvm-ecc-transpiler.workspace = true
openvm-stark-sdk = { workspace = true, features = ["cpu-backend"] }
openvm-mod-circuit-builder = { path = "../../../crates/circuits/mod-builder", default-features = false, features = ["test-utils"] }
openvm-circuit = { path = "../../../crates/vm", default-features = false, features = ["test-utils"] }
halo2curves-axiom = { workspace = true }
openvm-ecc-guest = { path = "../../ecc/guest", default-features = false }
openvm-pairing-guest = { path = "../guest", default-features = false, features = [
    "halo2curves",
    "bls12_381",
    "bn254",
] }
rand08 = { package = "rand", version = "0.8.5", features = ["std_rng"] }

[features]
default = []
tco = ["openvm-riscv-circuit/tco", "openvm-ecc-circuit/tco"]
rvr = [
    "dep:rvr-openvm-lift",
    "dep:rvr-openvm-ext-pairing",
    "openvm-riscv-circuit/rvr",
    "openvm-algebra-circuit/rvr",
    "openvm-ecc-circuit/rvr",
]
cuda = [
    "dep:openvm-cuda-backend",
    "dep:openvm-stark-sdk",
    "openvm-circuit-primitives/cuda",
    "openvm-circuit/cuda",
    "openvm-algebra-circuit/cuda",
    "openvm-ecc-circuit/cuda",
]
touchemall = [
    "cuda",
    "openvm-circuit/touchemall",
    "openvm-circuit-primitives/touchemall",
    "openvm-cuda-backend/touchemall",
    "openvm-algebra-circuit/touchemall",
    "openvm-ecc-circuit/touchemall",
    "openvm-riscv-circuit/touchemall",
]
