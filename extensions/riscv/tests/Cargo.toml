[package]
name = "openvm-riscv-integration-tests"
description = "Integration tests for the OpenVM RISC-V extension"
version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
openvm-instructions = { workspace = true }
openvm-stark-sdk.workspace = true
openvm-circuit = { workspace = true, features = ["test-utils"] }
openvm-transpiler.workspace = true
openvm-riscv-circuit.workspace = true
openvm-riscv-guest.workspace = true
openvm-riscv-transpiler.workspace = true
openvm = { workspace = true }
openvm-toolchain-tests = { path = "../../../crates/toolchain/tests" }
eyre.workspace = true
test-case.workspace = true
serde = { workspace = true, features = ["alloc"] }
strum.workspace = true

[features]
default = ["parallel"]
parallel = ["openvm-circuit/parallel"]
tco = ["openvm-riscv-circuit/tco"]
aot = ["openvm-riscv-circuit/aot"]
cuda = ["openvm-riscv-circuit/cuda"]
