[package]
name = "rvr-openvm-ext-riscv"
description = "rvr lifter for the OpenVM RISC-V I/O extension (HINT_STORED, HINT_BUFFER, REVEAL)"
version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
rvr-openvm-ext-ffi-common = { workspace = true, optional = true }
rvr-openvm-ir = { workspace = true, optional = true }
rvr-openvm-lift = { workspace = true, optional = true }

openvm-circuit = { workspace = true, optional = true }
openvm-instructions = { workspace = true, optional = true }
openvm-platform = { workspace = true, optional = true }
openvm-riscv-transpiler = { workspace = true, optional = true }
openvm-stark-backend = { workspace = true, optional = true }

libloading = { workspace = true, optional = true }
rand = { workspace = true, optional = true }

[dev-dependencies]
p3-baby-bear.workspace = true

[features]
default = []
rvr = [
    "dep:rvr-openvm-ext-ffi-common",
    "dep:rvr-openvm-ir",
    "dep:rvr-openvm-lift",
    "openvm-circuit/rvr",
    "dep:openvm-instructions",
    "dep:openvm-platform",
    "dep:openvm-riscv-transpiler",
    "dep:openvm-stark-backend",
    "dep:libloading",
    "dep:rand",
]
