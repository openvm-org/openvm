[package]
name = "openvm-keccak256"
description = "OpenVM library for keccak256"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
openvm-keccak256-guest = { workspace = true }
tiny-keccak = { workspace = true, optional = true }

# Guest-only. `spin::Mutex` is used by `zkvm_impl`; `portable_atomic` feature
# routes CAS through `portable-atomic`, which in turn uses the `critical-section`
# backend (no-op impl in `openvm-platform`).
[target.'cfg(all(target_arch = "riscv64", target_os = "none"))'.dependencies]
spin = { workspace = true, features = ["mutex", "spin_mutex", "portable_atomic"] }
portable-atomic = { workspace = true, features = ["critical-section"] }

[dev-dependencies]
hex = { workspace = true }
openvm-instructions = { workspace = true }
openvm-sdk = { workspace = true }
openvm-stark-sdk = { workspace = true }
openvm-circuit = { workspace = true, features = ["test-utils", "parallel"] }
openvm-transpiler = { workspace = true }
openvm-keccak256-transpiler = { workspace = true }
openvm-keccak256-circuit = { workspace = true }
openvm-riscv-transpiler = { workspace = true }
openvm-toolchain-tests = { workspace = true }
eyre = { workspace = true }

[features]
default = ["tiny_keccak"]
aot = ["openvm-sdk/aot"]
# Internal feature for testing only.
cuda = ["openvm-keccak256-circuit/cuda"]
# Enable tiny_keccak::Hasher trait implementation
tiny_keccak = ["dep:tiny-keccak"]

[lints]
workspace = true
