images:
  arm64-rust-riscv-dev-32gb:
    platform: "linux"
    arch: "arm64"
    owner: "405894839083"
    name: "arm64-rust-riscv-dev-32gb"
    ami: "ami-040a96edd406c9478"

runners:
  # runners for running tests
  test-gpu-nvidia:
    family: ["g7e.2xlarge", "g7.2xlarge", "g6e.2xlarge"]
    image: ubuntu24-gpu-x64
    spot: capacity-optimized
    extras: s3-cache
    preinstall: |
      nvidia-smi
      nvidia-smi -L
      echo 'CUDA_ARCH=86,89,120' >> $GITHUB_ENV
