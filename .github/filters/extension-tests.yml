# Add an extension by defining a filter with the same name as its directory.
# CPU and CUDA jobs are selected from these filters.
shared: &shared
  - "crates/circuits/**"
  - "crates/vm/**"
  - "crates/toolchain/**"
  - "Cargo.toml"
  - "Cargo.lock"
  - "rust-toolchain.toml"
  - ".cargo/config.toml"
  - ".github/actions/sccache/**"
  - ".github/filters/extension-tests.yml"
  - ".github/workflows/extension-tests.group.yml"
  - ".github/workflows/extension-tests.yml"
cuda:
  - ".github/actions/rust-cache-cuda/**"
  - ".github/workflows/extension-tests.cuda.yml"
  - "scripts/gpu_driver_setup.sh"
rv32im: &rv32im
  - *shared
  - "extensions/rv32im/**"
  - "extensions/rv32-adapters/**"
keccak256:
  - *rv32im
  - "extensions/keccak256/**"
sha2:
  - *rv32im
  - "extensions/sha2/**"
bigint:
  - *rv32im
  - "extensions/bigint/**"
  - "extensions/rv32-adapters/**"
algebra: &algebra
  - *rv32im
  - "extensions/algebra/**"
  - "extensions/ecc/**"
  - "extensions/pairing/guest/**"
  - "extensions/rv32-adapters/**"
ecc:
  - *algebra
  - "crates/sdk/**"
  - "crates/sdk-config/**"
pairing:
  - *rv32im
  - "extensions/algebra/**"
  - "extensions/ecc/**"
  - "extensions/rv32-adapters/**"
  - "extensions/pairing/**"
deferral:
  - *rv32im
  - "extensions/deferral/**"
