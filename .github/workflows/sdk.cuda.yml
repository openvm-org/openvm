name: SDK Tests (CUDA)

on:
  workflow_call:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
    paths:
      - "crates/continuations/**"
      - "crates/recursion/**"
      - "crates/sdk/**"
      - "crates/sdk-config/**"
      - "crates/static-verifier/**"
      - "crates/verify/**"
      - "extensions/deferral/**"
      - "guest-libs/verify-stark/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/sdk.cuda.yml"

concurrency:
  group: sdk-cuda-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cuda-backend:
    name: Root prover, EVM, and Halo2
    runs-on:
      - runs-on=${{ github.run_id }}/image=ubuntu24-gpu-x64/family=g7e.2xlarge+g6e.2xlarge+g7.4xlarge/volume=80gb/spot=capacity-optimized/extras=s3-cache
    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_PERMIT_COPY_RENAME: "1"
      - uses: ./.github/actions/sccache
      # TODO: remove once https://github.com/runs-on/runner-images-for-aws/issues/55 is fixed
      - name: Setup GPU driver
        run: bash ./scripts/gpu_driver_setup.sh
      - uses: ./.github/actions/rust-cache-cuda
      - uses: taiki-e/install-action@nextest
      - name: Install architecture specific tools
        run: |
          source ci/scripts/utils.sh
          install_s5cmd

      - name: Install solc
        # The SDK EVM/Halo2 verification tests shell out to solc when generating verifiers.
        run: (hash svm 2>/dev/null || cargo install --locked --version 0.2.23 svm-rs) && svm install 0.8.19 && solc --version
      - name: Verify GPU setup
        run: |
          nvidia-smi
          nvidia-smi -L
          nvcc --version
          echo "CUDA_ARCH=86,89,120" >> $GITHUB_ENV

      - name: Setup CUDA environment
        run: |
          # Find the actual CUDA library location
          CUDART_PATH=$(find /usr/local -name "libcudart.so" | head -1)
          if [ -n "$CUDART_PATH" ]; then
            CUDA_LIB_DIR=$(dirname "$CUDART_PATH")
            echo "CUDA libraries found at: $CUDA_LIB_DIR"
            echo "CUDA_LIB_DIR=$CUDA_LIB_DIR" >> $GITHUB_ENV
          else
            echo "CUDA libraries not found!"
            exit 1
          fi

      - name: Setup halo2
        working-directory: crates/sdk
        run: |
          bash ../../scripts/trusted_setup_s3.sh

      - name: Run SDK CUDA tests
        working-directory: crates/sdk
        run: |
          rustup component add rust-src --toolchain nightly-2026-01-18
          cargo nextest run --cargo-profile=fast --features cuda,root-prover,evm-verify,halo2-gpu --test-threads=1

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
