name: CUDA SDK Tests

on:
  workflow_dispatch:
    inputs:
      sweep_mode:
        description: "Which parameter sweep to run"
        type: choice
        options:
          - sweep_internal
          - sweep_root
          - sweep_evm
        default: sweep_internal
      test_name:
        description: "Comma-separated test filters passed to --test-name"
        type: string
        default: ""
      num_samples:
        description: "Number of parameter samples passed to --num-samples"
        type: string
        default: ""
      instance_family:
        type: string
        required: false
        description: Runner instance family, or multiple families joined with "+" (e.g. g6+g5)
        default: g6e.2xlarge

  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
    paths:
      - "crates/continuations/**"
      - "crates/recursion/**"
      - "crates/sdk/**"
      - ".github/workflows/sdk.cuda.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  cuda-backend:
    name: sdk cuda tests
    runs-on:
      - runs-on=${{ github.run_id }}/image=ubuntu24-gpu-x64/family=${{ inputs.instance_family || github.event.inputs.instance_family || 'g6e.2xlarge' }}/volume=80gb/tag=sdk-cuda-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}/extras=s3-cache/spot=false
    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_PERMIT_COPY_RENAME: "1"
      - uses: ./.github/actions/sccache
      - uses: ./.github/actions/rust-cache-cuda
      - uses: taiki-e/install-action@nextest
      - name: Install solc
        if: ${{ inputs.sweep_mode == 'sweep_evm' }}
        run: (hash svm 2>/dev/null || cargo install --locked --version 0.2.23 svm-rs) && svm install 0.8.19 && solc --version

      - name: Install Foundry
        if: ${{ inputs.sweep_mode == 'sweep_evm' }}
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.3.5

      - name: Install architecture specific tools
        if: ${{ inputs.sweep_mode == 'sweep_evm' }}
        run: |
          source ci/scripts/utils.sh
          install_s5cmd

      - name: Setup halo2
        if: ${{ inputs.sweep_mode == 'sweep_evm' }}
        working-directory: crates/sdk
        run: |
          bash ../../scripts/trusted_setup_s3.sh

      - name: Verify GPU setup
        run: |
          nvidia-smi
          nvidia-smi -L
          nvcc --version
          echo "CUDA_ARCH=86,89,120" >> $GITHUB_ENV

      - name: Setup CUDA environment
        run: |
          # Find the actual CUDA library location
          CUDART_PATH=$(find /usr/local -name "libcudart.so" | head -1)
          if [ -n "$CUDART_PATH" ]; then
            CUDA_LIB_DIR=$(dirname "$CUDART_PATH")
            echo "CUDA libraries found at: $CUDA_LIB_DIR"
            echo "CUDA_LIB_DIR=$CUDA_LIB_DIR" >> $GITHUB_ENV
          else
            echo "CUDA libraries not found!"
            exit 1
          fi

      - name: Build SDK CUDA tests
        if: ${{ github.event_name == 'workflow_dispatch' }}
        working-directory: crates/sdk
        run: |
          rustup component add rust-src --toolchain nightly-2026-01-18

          TEST_FILTERS=()
          if [[ -n "${{ inputs.test_name }}" ]]; then
            IFS=',' read -ra TEST_FILTERS <<< "${{ inputs.test_name }}"
          fi

          build_cuda_tests() {
            local features="$1"
            local cmd=(cargo nextest run --no-run --test-threads=1 --cargo-profile=fast --features "$features")
            if [[ ${#TEST_FILTERS[@]} -gt 0 ]]; then
              cmd+=(-- "${TEST_FILTERS[@]}")
            fi
            "${cmd[@]}"
          }

          case "${{ inputs.sweep_mode }}" in
            sweep_internal)
              build_cuda_tests "parallel,cuda"
              ;;
            sweep_root)
              build_cuda_tests "parallel,root-prover,cuda"
              ;;
            sweep_evm)
              build_cuda_tests "parallel,root-prover,evm-verify,cuda"
              ;;
            *)
              build_cuda_tests "cuda,root-prover"
              ;;
          esac

      - name: Generate sweep JSON files if missing
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          cargo run --bin generate-param-sweep -- crates/sdk/tests/

      - name: Run SDK CUDA sweep
        if: ${{ github.event_name == 'workflow_dispatch' }}
        working-directory: crates/sdk
        run: |
          rustup component add rust-src --toolchain nightly-2026-01-18
          export RUST_LOG=debug
          SWEEP_ARGS=("-j=1")
          LOGS=()
          SWEEP_EXIT=0
          # filter by test name if the option is set, test_name is comma separated test names in crates/sdk/src/tests.rs, eg. test_sdk_fibonacci,test_verify_stark_deferral
          if [[ -n "${{ inputs.test_name }}" ]]; then SWEEP_ARGS+=(--test-name "${{ inputs.test_name }}"); fi
          # randomly sample a subset if set, else run all of them
          if [[ -n "${{ inputs.num_samples }}" ]]; then SWEEP_ARGS+=(--num-samples "${{ inputs.num_samples }}"); fi
          mkdir -p sweeps

          run_sweep() {
            local log_dir="$1"
            shift

            mkdir -p "$log_dir"
            LOGS+=("$log_dir")
            if ! python3 tests/run_sdk_sweep.py --mode cuda --log-dir="$log_dir" "$@"; then
              SWEEP_EXIT=1
            fi
          }

          # some configs won't work if root is enabled
          case "${{ inputs.sweep_mode }}" in
            sweep_internal)
              run_sweep "sweeps/sweep_internal" "${SWEEP_ARGS[@]}" --prove-mode stark --sweep tests/internal_sweep_no_root.json
              ;;
            sweep_root)
              run_sweep "sweeps/sweep_root" "${SWEEP_ARGS[@]}" --prove-mode root --sweep tests/internal_sweep_root.json tests/root_params.json
              ;;
            sweep_evm)
              run_sweep "sweeps/sweep_evm" "${SWEEP_ARGS[@]}" --prove-mode evm --sweep tests/internal_sweep_root.json tests/root_params.json
              ;;
          esac

          if ! python3 tests/post_test_summarize.py -o "sweeps/ci_summary.md" --artifact-path-prefix="" --log-dirs "${LOGS[@]}"; then
            SWEEP_EXIT=1
          fi
          # don't exit early, as we want to aggregate the logs first
          echo "$SWEEP_EXIT" > sweeps/sweep_exit_code

      - name: Run SDK CUDA tests
        if: ${{ github.event_name != 'workflow_dispatch' }}
        working-directory: crates/sdk
        run: |
          rustup component add rust-src --toolchain nightly-2026-01-18
          export RUST_LOG=debug
          cargo nextest run --cargo-profile=fast --features cuda,root-prover --test-threads=1

      - name: Upload SDK CUDA sweep artifacts
        id: upload-sdk-cuda-sweep
        if: ${{ always() && github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: sdk-cuda-sweep
          if-no-files-found: ignore
          path: |
            crates/sdk/sweeps/**

      - name: Publish SDK CUDA sweep summary
        if: ${{ always() && github.event_name == 'workflow_dispatch' }}
        working-directory: crates/sdk
        run: |
          CI_SUMMARY_PATH="$(find sweeps -name ci_summary.md -print 2>/dev/null | sort | tail -n 1)"
          if [[ -n "$CI_SUMMARY_PATH" ]]; then
            LOG_DIR="$(dirname "$CI_SUMMARY_PATH")"
            echo "Logs are uploaded in the [sdk-cuda-sweep](${{ steps.upload-sdk-cuda-sweep.outputs.artifact-url }}) artifact under \`$LOG_DIR\`." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat "$CI_SUMMARY_PATH" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No SDK CUDA sweep summary was generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Fail SDK CUDA sweep if needed # if we use sweep mode, fail here after the logs are generated in the summary (includes failed logs)
        if: ${{ always() && github.event_name == 'workflow_dispatch' }}
        working-directory: crates/sdk
        run: |
          if [[ ! -f sweeps/sweep_exit_code ]]; then
            echo "SDK CUDA sweep status file missing."
            exit 1
          fi

          SWEEP_EXIT="$(cat sweeps/sweep_exit_code)"
          if [[ "$SWEEP_EXIT" != "0" ]]; then
            echo "SDK CUDA sweep failed."
            exit "$SWEEP_EXIT"
          fi
