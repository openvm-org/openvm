name: Extension Tests

on:
  workflow_call:
  push:
    branches: ["main"]
    paths: &extension_test_paths
      - "crates/circuits/**"
      - "crates/vm/**"
      - "crates/toolchain/**"
      - "crates/sdk/**"
      - "crates/sdk-config/**"
      - "crates/rvr/**"
      - "extensions/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/config.toml"
      - ".github/actions/sccache/**"
      - ".github/filters/extension-tests.yml"
      - ".github/workflows/extension-tests.group.yml"
      - ".github/workflows/extension-tests.yml"
      - "ci/install-openvm-toolchain.sh"
  pull_request:
    branches: ["**"]
    paths: *extension_test_paths

concurrency:
  group: ${{ github.workflow_ref }}-extension-tests-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  changes:
    name: Select affected extensions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      extensions: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: .github/filters/extension-tests.yml

  extension-tests:
    needs: changes
    if: needs.changes.outputs.extensions != '[]'
    name: ${{ format('{0} ({1})', matrix.extension == 'riscv' && 'RISC-V' || matrix.extension, matrix.mode == 'rvr' && 'RVR' || matrix.mode) }}
    strategy:
      matrix:
        extension: ${{ fromJSON(needs.changes.outputs.extensions) }}
        mode: [default, rvr]
        exclude:
          - { extension: shared, mode: default }
          - { extension: shared, mode: rvr }
          - { extension: cuda, mode: default }
          - { extension: cuda, mode: rvr }
      # Ensure tests run in parallel even if one fails
      fail-fast: false
    uses: ./.github/workflows/extension-tests.group.yml
    with:
      runner_id: cpu-${{ strategy.job-index }}
      machine_type: ${{ matrix.extension == 'algebra' && 'family=c9g.4xlarge+c8g.4xlarge+m9g.4xlarge+m8g.4xlarge/image=ubuntu24-full-arm64/volume=80gb' || 'family=c9g.8xlarge+c8g.8xlarge+m9g.8xlarge+m8g.8xlarge/image=ubuntu24-full-arm64/volume=80gb' }}
      extensions: ${{ matrix.extension }}
      mode: ${{ matrix.mode }}
    secrets: inherit

  riscv-unprotected:
    needs: changes
    if: contains(fromJSON(needs.changes.outputs.extensions), 'riscv')
    name: RISC-V (unprotected)
    uses: ./.github/workflows/extension-tests.group.yml
    with:
      runner_id: cpu-riscv-unprotected
      machine_type: family=c9g.8xlarge+c8g.8xlarge+m9g.8xlarge+m8g.8xlarge/image=ubuntu24-full-arm64/volume=80gb
      extensions: riscv
      mode: unprotected
    secrets: inherit
