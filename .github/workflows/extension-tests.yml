name: Extension Tests

on:
  workflow_call:
  push:
    branches: ["main"]
    paths: &extension_test_paths
      - "crates/circuits/**"
      - "crates/vm/**"
      - "crates/toolchain/**"
      - "crates/sdk/**"
      - "crates/sdk-config/**"
      - "extensions/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/config.toml"
      - ".github/actions/sccache/**"
      - ".github/filters/extension-tests.yml"
      - ".github/workflows/extension-tests.group.yml"
      - ".github/workflows/extension-tests.yml"
  pull_request:
    branches: ["**"]
    paths: *extension_test_paths

concurrency:
  group: ${{ github.workflow_ref }}-extension-tests-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  changes:
    name: Select affected extensions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      extensions: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: .github/filters/extension-tests.yml

  extension-tests:
    needs: changes
    if: needs.changes.outputs.extensions != '[]'
    name: ${{ format('{0} ({1})', matrix.extension == 'rv32im' && 'RV32IM' || matrix.extension, matrix.mode == 'aot' && 'AOT' || matrix.mode) }}
    strategy:
      matrix:
        extension: ${{ fromJSON(needs.changes.outputs.extensions) }}
        mode: [default, aot]
        exclude:
          - { extension: shared, mode: default }
          - { extension: shared, mode: aot }
          - { extension: cuda, mode: default }
          - { extension: cuda, mode: aot }
      # Ensure tests run in parallel even if one fails
      fail-fast: false
    uses: ./.github/workflows/extension-tests.group.yml
    with:
      runner_id: cpu-${{ strategy.job-index }}
      machine_type: family=c8i-flex.16xlarge+c8i.16xlarge+c8a.16xlarge+c7i.16xlarge+c7a.16xlarge/image=ubuntu24-full-x64/volume=80gb
      extensions: ${{ matrix.extension }}
      mode: ${{ matrix.mode }}
    secrets: inherit
