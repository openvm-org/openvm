name: Extension Tests

on:
  workflow_call:
  push:
    branches: ["main"]
    paths: &extension_test_paths
      - "crates/circuits/**"
      - "crates/vm/**"
      - "crates/toolchain/**"
      - "crates/sdk/**"
      - "crates/sdk-config/**"
      - "extensions/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/config.toml"
      - ".github/actions/sccache/**"
      - ".github/filters/extension-tests.yml"
      - ".github/workflows/extension-tests.group.yml"
      - ".github/workflows/extension-tests.yml"
  pull_request:
    branches: ["**"]
    paths: *extension_test_paths

concurrency:
  group: ${{ github.workflow_ref }}-extension-tests-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  changes:
    name: Select affected extensions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      extensions: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: .github/filters/extension-tests.yml

  extension-tests:
    needs: changes
    if: needs.changes.outputs.extensions != '[]'
    name: ${{ format('{0} ({1})', matrix.extension == 'rv32im' && 'RV32IM' || matrix.extension, matrix.mode == 'aot' && 'AOT' || matrix.mode) }}
    strategy:
      matrix:
        extension: ${{ fromJSON(needs.changes.outputs.extensions) }}
        mode: [default, aot]
        exclude:
          - { extension: shared, mode: default }
          - { extension: shared, mode: aot }
          - { extension: cuda, mode: default }
          - { extension: cuda, mode: aot }
      # Ensure tests run in parallel even if one fails
      fail-fast: false
    uses: ./.github/workflows/extension-tests.group.yml
    with:
      runner_id: cpu-${{ strategy.job-index }}
      machine_type: ${{ matrix.extension == 'algebra' && (matrix.mode == 'aot' && 'family=c8i-flex.4xlarge+c8i.4xlarge+c8a.4xlarge+m8i-flex.4xlarge+m8i.4xlarge+m8a.4xlarge+c7i.4xlarge+c7a.4xlarge+m7i.4xlarge+m7a.4xlarge/image=ubuntu24-full-x64/volume=80gb' || 'family=c9g.4xlarge+c8g.4xlarge+m9g.4xlarge+m8g.4xlarge/image=ubuntu24-full-arm64/volume=80gb') || (matrix.mode == 'aot' && 'family=c8i-flex.8xlarge+c8i.8xlarge+c8a.8xlarge+m8i-flex.8xlarge+m8i.8xlarge+m8a.8xlarge+c7i.8xlarge+c7a.8xlarge+m7i.8xlarge+m7a.8xlarge/image=ubuntu24-full-x64/volume=80gb' || 'family=c9g.8xlarge+c8g.8xlarge+m9g.8xlarge+m8g.8xlarge/image=ubuntu24-full-arm64/volume=80gb') }}
      extensions: ${{ matrix.extension }}
      mode: ${{ matrix.mode }}
    secrets: inherit
