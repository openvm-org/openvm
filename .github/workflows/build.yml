name: Build Workspace

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  workflow_call:

concurrency:
  group: ${{ github.workflow_ref }}-build-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: Cargo build
    runs-on:
      - runs-on=${{ github.run_id }}/family=m9g.8xlarge+m8g.8xlarge/image=ubuntu24-full-arm64/volume=80gb/extras=s3-cache
    steps:
      - uses: runs-on/action@v2
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - name: Init rvr FFI submodules
        run: |
          git submodule update --init --depth 1 extensions/keccak256/rvr/ffi/openssl
          git submodule update --init --depth 1 extensions/algebra/rvr/ffi/modular/secp256k1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run build
        run: cargo build --verbose
