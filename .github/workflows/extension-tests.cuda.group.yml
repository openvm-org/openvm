name: CUDA Extension Test Group

on:
  workflow_call:
    inputs:
      group:
        required: true
        type: string
      machine_type:
        required: true
        type: string
      riscv:
        type: boolean
        default: false
      keccak256:
        type: boolean
        default: false
      sha2:
        type: boolean
        default: false
      bigint:
        type: boolean
        default: false
      algebra:
        type: boolean
        default: false
      ecc:
        type: boolean
        default: false
      pairing:
        type: boolean
        default: false
      deferral:
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  tests:
    name: CUDA (${{ inputs.group }})
    runs-on:
      - runs-on=${{ github.run_id }}-extension-tests-cuda-${{ github.run_attempt }}-${{ inputs.group }}/${{ inputs.machine_type }}/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_PERMIT_COPY_RENAME: "1"
      - uses: ./.github/actions/sccache

      # TODO: remove once https://github.com/runs-on/runner-images-for-aws/issues/55 is fixed
      - name: Setup GPU driver
        run: bash ./scripts/gpu_driver_setup.sh

      - uses: ./.github/actions/rust-cache-cuda
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest

      - name: Check CUDA status and set environment variables
        run: |
          nvidia-smi
          nvidia-smi -L
          nvcc --version
          echo "CUDA_ARCH=86,89,120" >> $GITHUB_ENV
          echo "NEXTEST_ENV=CUDA_OPT_LEVEL=3" >> $GITHUB_ENV
          echo "FEATURE_ARGS=--features=cuda" >> $GITHUB_ENV
          echo "VPMM_PAGES=1" >> $GITHUB_ENV

      - name: Run RISC-V tests
        if: inputs.riscv
        working-directory: extensions/riscv
        run: |
          pushd circuit
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass
          popd
          pushd tests
          "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast ${{ env.FEATURE_ARGS }} --profile=heavy --no-tests=pass
          popd

      - name: Run Keccak-256 tests
        if: inputs.keccak256
        working-directory: extensions/keccak256/circuit
        run: ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass

      - name: Run SHA-2 tests
        if: inputs.sha2
        working-directory: extensions/sha2/circuit
        run: ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass

      - name: Run bigint tests
        if: inputs.bigint
        working-directory: extensions/bigint/circuit
        run: ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass

      - name: Run algebra tests
        if: inputs.algebra
        working-directory: extensions/algebra
        run: |
          pushd circuit
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass
          popd
          pushd tests
          "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast ${{ env.FEATURE_ARGS }} --profile=heavy --no-tests=pass
          popd

      - name: Run ECC tests
        if: inputs.ecc
        working-directory: extensions/ecc
        run: |
          pushd circuit
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass
          popd
          pushd tests
          "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast ${{ env.FEATURE_ARGS }} --profile=heavy --no-tests=pass
          popd

      - name: Run pairing tests
        if: inputs.pairing
        working-directory: extensions/pairing/circuit
        run: ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass

      - name: Run deferral tests
        if: inputs.deferral
        working-directory: extensions/deferral
        run: |
          pushd circuit
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass
          popd
          pushd tests
          "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast ${{ env.FEATURE_ARGS }} --profile=heavy --no-tests=pass
          popd

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
