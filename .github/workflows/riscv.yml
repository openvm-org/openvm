name: RISC-V Test Vectors

on:
  workflow_call:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
    paths:
#     - "crates/circuits/primitives/**"
#     - "crates/vm/**"
#     - "crates/toolchain/**"
      - "extensions/rv32im/circuit/**"
      - "extensions/rv32im/transpiler/**"
      - "extensions/rv32im/guest/**"
#     - "Cargo.toml"
      - ".github/workflows/riscv.yml"

concurrency:
  group: ${{ github.workflow_ref }}-riscv-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  riscv-test-vector:
    strategy:
      matrix:
        platform:
          # TODO(aot): restore `features: "aot"`
          - {
              labels: "runner=64cpu-linux-x64/image=ubuntu24-full-x64",
              image: "ubuntu24-full-x64",
              features: "",
            }
          - {
              labels: "runner=64cpu-linux-x64/image=ubuntu24-full-x64",
              image: "ubuntu24-full-x64",
              features: "rvr",
            }
          - {
              labels: "image=ubuntu24-gpu-x64/family=g6.*+g5+g6e/cpu=4+32/volume=40gb/spot=capacity-optimized",
              image: "ubuntu24-gpu-x64",
              features: "cuda,touchemall",
            }

    runs-on:
      - runs-on=${{ github.run_id }}-riscv-${{ github.run_attempt }}-${{ strategy.job-index }}/${{ matrix.platform.labels }}/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - run: | # avoid cross-device link error
          rustup component remove clippy || true
          rm -rf ~/.rustup/toolchains/stable-x86_64-unknown-linux-gnu || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest
      - uses: actions/checkout@v5
      - name: Init RISC-V test-vector submodule
        run: git submodule update --init --depth 1 crates/toolchain/tests/rv32im-test-vectors/riscv-tests
      - name: Init rvr FFI submodules
        if: matrix.platform.features == 'rvr'
        run: |
          git submodule update --init --depth 1 extensions/keccak256/rvr/ffi/openssl
          git submodule update --init --depth 1 extensions/algebra/rvr/ffi/modular/secp256k1
      - name: Configure sccache startup timeout
        run: |
          mkdir -p ~/.config/sccache
          echo "server_startup_timeout_ms = 60000" > ~/.config/sccache/config
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set feature flags
        run: |
          if [ -n "${{ matrix.platform.features }}" ]; then
            echo "FEATURE_ARGS=--features=${{ matrix.platform.features }}" >> $GITHUB_ENV
          else
            echo "FEATURE_ARGS=" >> $GITHUB_ENV
          fi

      - name: Set VPMM_PAGES for GPU
        if: contains(matrix.platform.features, 'cuda')
        run: |
          nvidia-smi
          nvidia-smi -L
          nvcc --version
          echo "CUDA_ARCH=86,89,120" >> $GITHUB_ENV
          echo "VPMM_PAGES=1" >> $GITHUB_ENV

      - name: Download and install risc64-elf-gcc
        if: contains(matrix.platform.image, 'x64')
        working-directory: ${{ github.workspace }}
        run: |
          # Download pre-built binary for x86
          wget -O gcc.tar.xz "https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2025.07.16/riscv64-elf-ubuntu-24.04-gcc-nightly-2025.07.16-nightly.tar.xz"
          tar -xJf gcc.tar.xz
          echo "$GITHUB_WORKSPACE/riscv/bin" >> $GITHUB_PATH
          rm gcc.tar.xz

      - name: Install clang-22 and lld (required for rvr)
        if: matrix.platform.features == 'rvr'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y lld

      - name: Run Makefile
        working-directory: crates/toolchain/tests/rv32im-test-vectors
        run: |
          make

        # Run execution tests on CPU, full prover tests on GPU
      - name: Run RISC-V test vector tests
        working-directory: crates/toolchain/tests
        run: |
          rustup component add rust-src --toolchain nightly-2026-01-18
          if [[ "${{ matrix.platform.features }}" == *"cuda"* ]]; then
            TEST_NAME=test_rv32im_riscv_vector_prove
          else
            TEST_NAME=test_rv32im_riscv_vector_runtime
          fi
          cargo nextest run ${{ env.FEATURE_ARGS }} --cargo-profile=fast --run-ignored only --no-capture -- $TEST_NAME

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
