name: CUDA CLI Tests

# Mirrors cli.yml but builds and runs `cargo-openvm` with the CUDA backend
# (--features cuda) on a GPU runner. Exercises:
#   * Examples loop and determinism check under CUDA-built `cargo openvm`.
#   * Integration tests in crates/cli/tests/integration.rs (with SKIP_INSTALL=1
#     so the scripts pick up the CUDA-built binary already on PATH).
#   * Optionally the #[ignore]'d EVM end-to-end test.

on:
  workflow_dispatch:
    inputs:
      use_local_openvm:
        description: "Patch the project generated by `cargo openvm init` to point at the local openvm checkout"
        type: boolean
        default: false
      run_evm_e2e:
        description: "Also run the ignored EVM end-to-end test (expensive)"
        type: boolean
        default: true
      instance_family:
        type: string
        required: false
        description: Runner instance family, or multiple families joined with "+" (e.g. g6+g5)
        default: g6e.2xlarge
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
    paths:
      - "crates/cli/**"
      - ".github/workflows/cli.cuda.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  cli-cuda-tests:
    name: cli cuda tests
    runs-on:
      - runs-on=${{ github.run_id }}/image=ubuntu24-gpu-x64/family=${{ inputs.instance_family || github.event.inputs.instance_family || 'g6e.2xlarge' }}/volume=80gb/tag=cli-cuda-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}/extras=s3-cache/spot=false

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_PERMIT_COPY_RENAME: "1"
      - uses: ./.github/actions/sccache
      - uses: ./.github/actions/rust-cache-cuda
      - uses: taiki-e/install-action@nextest

      - name: Install solc
        # `cargo openvm setup --evm` and the stark/EVM e2e scripts shell out to solc.
        run: |
          (hash svm 2>/dev/null || cargo install --locked --version 0.2.23 svm-rs) && svm install 0.8.19 && solc --version

      - name: Verify GPU setup
        run: |
          nvidia-smi
          nvidia-smi -L
          nvcc --version
          echo "CUDA_ARCH=86,89,120" >> $GITHUB_ENV

      - name: Setup CUDA environment
        run: |
          CUDART_PATH=$(find /usr/local -name "libcudart.so" | head -1)
          if [ -n "$CUDART_PATH" ]; then
            CUDA_LIB_DIR=$(dirname "$CUDART_PATH")
            echo "CUDA libraries found at: $CUDA_LIB_DIR"
            echo "CUDA_LIB_DIR=$CUDA_LIB_DIR" >> $GITHUB_ENV
          else
            echo "CUDA libraries not found!"
            exit 1
          fi

      - name: Build cargo-openvm (CUDA)
        # Build once with --features cuda, then put it on PATH so subsequent steps
        # and the integration tests (which set SKIP_INSTALL=1) all use the same
        # GPU-enabled binary.
        run: |
          cargo build --locked --profile fast -p cargo-openvm --features cuda
          echo "${{ github.workspace }}/target/fast" >> $GITHUB_PATH

      - name: Build and run book examples
        working-directory: examples
        run: |
          set -e
          for dir in */; do
            if [ -f "${dir}Cargo.toml" ]; then
              echo "Building ${dir%/}"
              cd "$dir"
              cargo openvm build
              cargo openvm run
              cd ..
            fi
          done

      - name: Check build determinism
        working-directory: examples/ecc
        run: |
          cargo openvm build
          mv openvm/release/ecc-example.vmexe app1.vmexe
          cargo openvm build
          cmp app1.vmexe openvm/release/ecc-example.vmexe || (echo "Build is not deterministic!" && exit 1)

      - name: Run app-level keygen
        working-directory: crates/cli
        run: |
          export RUST_BACKTRACE=1
          cargo openvm keygen --config ./example/app_config.toml --output-dir .

      - name: Set USE_LOCAL_OPENVM
        # `cli_init_build.sh` reads USE_LOCAL_OPENVM to decide whether to patch the
        # project generated by `cargo openvm init` to depend on the local openvm
        # crate (=1) or the published one (=0).
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.use_local_openvm }}" == "false" ]]; then
            echo "USE_LOCAL_OPENVM=0" >> $GITHUB_ENV
          else
            echo "USE_LOCAL_OPENVM=1" >> $GITHUB_ENV
          fi

      - name: Run CLI integration tests (CUDA)
        # SKIP_INSTALL=1 so the tests reuse the CUDA-built cargo-openvm on PATH
        # rather than `cargo install`'ing a non-CUDA copy.
        working-directory: crates/cli
        run: |
          export SKIP_INSTALL=1
          cargo nextest run --cargo-profile=fast --test-threads=1 --features cuda

      - name: Run ignored EVM end-to-end test (CUDA)
        # `test_cli_evm_e2e_simplified` is #[ignore]d because EVM proof generation
        # is expensive; opt in via the workflow_dispatch checkbox.
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_evm_e2e }}
        working-directory: crates/cli
        run: |
          export SKIP_INSTALL=1
          cargo nextest run --cargo-profile=fast --test-threads=1 --features cuda --run-ignored=only -- test_cli_evm_e2e_simplified

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
