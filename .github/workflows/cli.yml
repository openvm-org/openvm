name: CLI Tests

# Exercises `cargo-openvm` end-to-end:
#   * Builds the CLI and puts it on PATH so the integration tests reuse it
#     (they read SKIP_INSTALL=1 to skip `cargo install`).
#   * Smoke-tests every project under examples/ with `cargo openvm build && run`
#     and a determinism check on examples/ecc.
#   * Runs the integration tests in crates/cli/tests/integration.rs, which shell
#     out to the scripts under crates/cli/tests/scripts/ covering app/stark e2e,
#     all `cargo openvm run --mode` variants, and `cargo openvm init` + build.
#   * Optionally runs the #[ignore]'d EVM end-to-end test on demand.

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]
    paths:
      - "crates/toolchain/build/**"
      - "crates/cli/**"
      - ".github/workflows/cli.yml"
  workflow_call:
  workflow_dispatch:
    inputs:
      use_local_openvm:
        description: "Patch the project generated by `cargo openvm init` to point at the local openvm checkout"
        type: boolean
        default: false
      run_evm_e2e:
        description: "Also run the ignored EVM end-to-end test (expensive)"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow_ref }}-cli-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  cli-tests:
    name: Integration and examples
    runs-on:
      - runs-on=${{ github.run_id }}/volume=80gb/family=c8i-flex.16xlarge+c8i.16xlarge+c8a.16xlarge+c7i.16xlarge+c7a.16xlarge/image=ubuntu24-full-x64/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/sccache
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest

      - name: Install solc
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_evm_e2e }}
        run: |
          (hash svm 2>/dev/null || cargo install --locked --version 0.2.23 svm-rs) && svm install 0.8.19 && solc --version

      - name: Build cargo-openvm
        # One build, then put it on PATH so subsequent steps and the integration
        # tests (which set SKIP_INSTALL=1) all use the same binary.
        run: |
          cargo build --locked --profile fast -p cargo-openvm
          echo "${{ github.workspace }}/target/fast" >> $GITHUB_PATH

      - name: Install openvm rust toolchain
        run: "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"

      - name: Build and run book examples
        working-directory: examples
        run: |
          set -e
          for dir in */; do
            if [ -f "${dir}Cargo.toml" ]; then
              echo "Building ${dir%/}"
              cd "$dir"
              cargo openvm build
              cargo openvm run
              cd ..
            fi
          done

      - name: Check build determinism
        # Build the same example twice and assert bit-for-bit equality of the vmexe.
        working-directory: examples/ecc
        run: |
          cargo openvm build
          mv openvm/release/ecc-example.vmexe app1.vmexe
          cargo openvm build
          cmp app1.vmexe openvm/release/ecc-example.vmexe || (echo "Build is not deterministic!" && exit 1)

      - name: Run default-config keygen
        working-directory: crates/cli
        run: cargo openvm keygen --output-dir .

      - name: Set USE_LOCAL_OPENVM
        # `cli_init_build.sh` reads USE_LOCAL_OPENVM to decide whether to patch the
        # project generated by `cargo openvm init` so it depends on the local
        # openvm crate (=1) or the published one on crates.io (=0). On version tag
        # pushes and explicit workflow_dispatch with the box unchecked we want to
        # validate against the published crate.
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.use_local_openvm }}" == "false" ]]; then
            echo "USE_LOCAL_OPENVM=0" >> $GITHUB_ENV
          else
            echo "USE_LOCAL_OPENVM=1" >> $GITHUB_ENV
          fi

      - name: Run CLI integration tests
        working-directory: crates/cli
        env:
          SKIP_INSTALL: "1"
          USE_LOCAL_OPENVM: ${{ env.USE_LOCAL_OPENVM }}
        run: cargo nextest run --cargo-profile=fast --test-threads=1

      - name: Run ignored EVM end-to-end test
        # `test_cli_evm_e2e_simplified` is #[ignore]d because EVM proof generation
        # is expensive; run it only when explicitly requested via workflow_dispatch.
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_evm_e2e }}
        working-directory: crates/cli
        env:
          SKIP_INSTALL: "1"
        run: cargo nextest run --cargo-profile=fast --test-threads=1 --run-ignored=only -- test_cli_evm_e2e_simplified

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  # Smoke-test the stock tier-3 `riscv64im-unknown-none-elf` path.
  app-level-cli-none-elf:
    name: riscv64im-unknown-none-elf smoke test
    runs-on:
      - runs-on=${{ github.run_id }}/volume=80gb/family=c8i-flex.2xlarge+c8i.2xlarge+c8a.2xlarge+c7i.2xlarge+c7a.2xlarge/image=ubuntu24-full-x64/extras=s3-cache
    env:
      OPENVM_RUST_TOOLCHAIN: nightly-2026-01-18
      OPENVM_RUSTC_TARGET: riscv64im-unknown-none-elf

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: none-elf

      - name: Install stock nightly + rust-src
        # Needed for the `-Z build-std` path.
        run: |
          rustup toolchain install "$OPENVM_RUST_TOOLCHAIN" --component rust-src --profile minimal
          rustup run "$OPENVM_RUST_TOOLCHAIN" rustc --version --verbose

      - name: Build cargo-openvm
        run: |
          cargo build --locked --profile fast -p cargo-openvm
          echo "${{ github.workspace }}/target/fast" >> $GITHUB_PATH

      - name: cargo openvm init + build + run (smoke)
        run: |
          set -e
          mkdir -p /tmp/openvm-none-elf-smoke
          cd /tmp/openvm-none-elf-smoke
          export OPENVM_GUEST_LOGFILE="$PWD/openvm-build.log"
          cargo openvm init smoke-fib
          cd smoke-fib
          # Exercise this checkout's openvm crate, not the version pinned by the template.
          local_openvm_path="${{ github.workspace }}/crates/toolchain/openvm"
          perl -0pi -e 's#openvm = \{ git = "https://github.com/openvm-org/openvm\.git".*?\}#openvm = { path = "'"$local_openvm_path"'" }#' Cargo.toml
          grep -Fq "openvm = { path = \"$local_openvm_path\" }" Cargo.toml
          cargo openvm build || { cat "$OPENVM_GUEST_LOGFILE"; exit 1; }
          fib_10_input="0x010A00000000000000"
          cargo openvm run --input "$fib_10_input"

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
