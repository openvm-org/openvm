name: OpenVM CLI Tests

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]
    paths:
      # - "crates/circuits/primitives/**"
      # - "crates/vm/**"
      - "crates/toolchain/build/**"
      # - "crates/sdk/**"
      - "crates/cli/**"
      # - "examples/**"
      # - "Cargo.toml"
      - ".github/workflows/cli.yml"
  workflow_call:
  workflow_dispatch:
    inputs:
      use_local_openvm:
        description: "Test cargo openvm init using local patch"
        required: true
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow_ref }}-cli-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  app-level-cli:
    runs-on:
      - runs-on=${{ github.run_id }}/volume=80gb/runner=64cpu-linux-x64/image=ubuntu24-full-x64/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/sccache
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest
      - name: Install solc # svm should support arm64 linux
        run: |
          (hash svm 2>/dev/null || cargo install --locked --version 0.2.23 svm-rs) && svm install 0.8.19 && solc --version

      - name: Build cargo-openvm
        run: |
          cargo build --locked --profile fast -p cargo-openvm
          echo "${{ github.workspace }}/target/fast" >> $GITHUB_PATH

      - name: Install openvm rust toolchain
        run: "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"

      - name: Build and run book examples
        working-directory: examples
        run: |
          set -e
          for dir in */; do
            if [ -f "${dir}Cargo.toml" ]; then
              echo "Building ${dir%/}"
              cd "$dir"
              cargo openvm build
              cargo openvm run
              cd ..
            fi
          done

      - name: check build consistency
        working-directory: examples/ecc
        run: |
          cargo openvm build
          mv openvm/release/ecc-example.vmexe app1.vmexe
          cargo openvm build
          cmp app1.vmexe openvm/release/ecc-example.vmexe || (echo "Build is not deterministic!" && exit 1)

      - name: Run app-level CLI commands
        working-directory: crates/cli
        run: |
          export RUST_BACKTRACE=1
          cargo openvm keygen --config ./example/app_config.toml --output-dir .

      - name: Set USE_LOCAL_OPENVM environment variable
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.use_local_openvm }}" == "false" ]]; then
            echo "USE_LOCAL_OPENVM=0" >> $GITHUB_ENV
          else
            echo "USE_LOCAL_OPENVM=1" >> $GITHUB_ENV
          fi

      - name: Run CLI tests
        working-directory: crates/cli
        run: |
          export SKIP_INSTALL=1
          cargo nextest run --cargo-profile=fast --test-threads=1

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  verify-stark-examples:
    name: verify-stark examples
    runs-on:
      - runs-on=${{ github.run_id }}-verify-stark-examples/image=ubuntu24-gpu-x64/family=g6.*+g5+g6e/cpu=4+32/volume=80gb/spot=capacity-optimized/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_PERMIT_COPY_RENAME: "1"
      - uses: ./.github/actions/sccache
      - uses: ./.github/actions/rust-cache-cuda
        with:
          cache-on-failure: true

      - name: Verify GPU setup
        run: |
          nvidia-smi
          nvidia-smi -L
          nvcc --version
          echo "CUDA_ARCH=86,89,120" >> $GITHUB_ENV

      - name: Setup CUDA environment
        run: |
          CUDART_PATH=$(find /usr/local -name "libcudart.so" | head -1)
          if [ -n "$CUDART_PATH" ]; then
            CUDA_LIB_DIR=$(dirname "$CUDART_PATH")
            echo "CUDA libraries found at: $CUDA_LIB_DIR"
            echo "CUDA_LIB_DIR=$CUDA_LIB_DIR" >> $GITHUB_ENV
          else
            echo "CUDA libraries not found!"
            exit 1
          fi

      - name: Build cargo-openvm
        run: |
          cargo build --locked --profile fast -p cargo-openvm --features cuda
          echo "${{ github.workspace }}/target/fast" >> $GITHUB_PATH

      - name: Install openvm rust toolchain
        run: "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"

      - name: Verify book examples with verify-stark
        run: |
          ./examples/verify-stark/verify-book-examples.sh

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  # Smoke-test the stock tier-3 `riscv64im-unknown-none-elf` path.
  app-level-cli-none-elf:
    name: app-level-cli (riscv64im-unknown-none-elf)
    runs-on:
      - runs-on=${{ github.run_id }}/disk=large/runner=8cpu-linux-x64/image=ubuntu24-full-x64/extras=s3-cache
    env:
      OPENVM_RUST_TOOLCHAIN: nightly-2026-01-18
      OPENVM_RUSTC_TARGET: riscv64im-unknown-none-elf

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: none-elf

      - name: Install stock nightly + rust-src
        # Needed for the `-Z build-std` path.
        run: |
          rustup toolchain install "$OPENVM_RUST_TOOLCHAIN" --component rust-src --profile minimal
          rustup run "$OPENVM_RUST_TOOLCHAIN" rustc --version --verbose

      - name: Build cargo-openvm
        run: |
          cargo build --locked --profile fast -p cargo-openvm
          echo "${{ github.workspace }}/target/fast" >> $GITHUB_PATH

      - name: cargo openvm init + build + run (smoke)
        run: |
          set -e
          mkdir -p /tmp/openvm-none-elf-smoke
          cd /tmp/openvm-none-elf-smoke
          export OPENVM_GUEST_LOGFILE="$PWD/openvm-build.log"
          cargo openvm init smoke-fib
          cd smoke-fib
          # Exercise this checkout's openvm crate, not the version pinned by the template.
          local_openvm_path="${{ github.workspace }}/crates/toolchain/openvm"
          perl -0pi -e 's#openvm = \{ git = "https://github.com/openvm-org/openvm\.git".*?\}#openvm = { path = "'"$local_openvm_path"'" }#' Cargo.toml
          grep -Fq "openvm = { path = \"$local_openvm_path\" }" Cargo.toml
          cargo openvm build || { cat "$OPENVM_GUEST_LOGFILE"; exit 1; }
          fib_10_input="0x010A00000000000000"
          cargo openvm run --input "$fib_10_input"

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
