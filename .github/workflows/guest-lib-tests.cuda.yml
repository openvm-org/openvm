name: Guest Library Tests (CUDA)

on:
  workflow_call:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
    paths:
#     - "crates/circuits/**"
#     - "crates/vm/**"
#     - "crates/toolchain/**"
#     - "extensions/**"
      - "guest-libs/**"
#     - "Cargo.toml"
      - ".github/workflows/guest-lib-tests.cuda.yml"
#     - "crates/sdk/guest/fib/**"

concurrency:
  group: ${{ github.workflow_ref }}-guest-lib-tests-cuda-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  guest-lib-tests-cuda:
    strategy:
      matrix:
        crates: # group crates on the same runner based on test time
          - { names: "sha2 keccak256" }
          - { names: "verify-stark" }
          - { names: "k256 p256" }
          - { names: "ff_derive pairing" }
    runs-on:
      - runs-on=${{ github.run_id }}-guest-lib-cuda-${{ github.run_attempt }}-${{ strategy.job-index }}/image=ubuntu24-gpu-x64/family=g7.4xlarge+g6.4xlarge/volume=40gb/spot=capacity-optimized/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            common:
              - "crates/circuits/**"
              - "crates/vm/**"
              - "crates/toolchain/**"
              - "extensions/riscv/**"
              - "extensions/riscv-adapters/**"
              - ".github/workflows/guest-lib-tests.cuda.yml"
              - "crates/sdk/guest/fib/**"
            sha2:
              - "extensions/sha2/**"
              - "guest-libs/sha2/**"
            keccak256:
              - "extensions/keccak256/**"
              - "guest-libs/keccak256/**"
            ff_derive:
              - "extensions/algebra/**"
              - "guest-libs/ff_derive/**"
            k256:
              - "extensions/algebra/**"
              - "extensions/ecc/**"
              - "guest-libs/k256/**"
            p256:
              - "extensions/algebra/**"
              - "extensions/ecc/**"
              - "guest-libs/p256/**"
            pairing:
              - "extensions/algebra/**"
              - "extensions/ecc/**"
              - "extensions/pairing/**"
              - "guest-libs/pairing/**"
            verify-stark:
              - "crates/recursion/**"
              - "crates/continuations/**"
              - "guest-libs/verify-stark/**"

      - name: Skip if no changes
        env:
          FILTER_OUTPUTS: ${{ toJSON(steps.filter.outputs) }}
        run: |
          # Check if common files changed
          COMMON_CHANGED=$(echo $FILTER_OUTPUTS | jq -r .common)

          # Check if any crate in the current matrix group changed
          ANY_CRATE_CHANGED=false
          for crate in ${{ matrix.crates.names }}; do
            crate_changed=$(echo $FILTER_OUTPUTS | jq -r --arg c "$crate" '.[$c]')
            if [[ "$crate_changed" == "true" ]]; then
              ANY_CRATE_CHANGED=true
              break
            fi
          done

          # Skip if neither common nor any crate in this matrix group changed
          if [[ "$COMMON_CHANGED" != "true" && "$ANY_CRATE_CHANGED" != "true" ]]; then
            echo "No relevant changes for crates [${{ matrix.crates.names }}], skipping tests."
            exit 0
          fi

      - uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_PERMIT_COPY_RENAME: "1"
      - uses: ./.github/actions/sccache

      # TODO: remove once https://github.com/runs-on/runner-images-for-aws/issues/55 is fixed
      - name: Setup GPU driver
        run: bash ./scripts/gpu_driver_setup.sh

      - uses: ./.github/actions/rust-cache-cuda
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest

      - name: Check CUDA status and set environment variables
        run: |
          nvidia-smi
          nvidia-smi -L
          nvcc --version
          echo "CUDA_ARCH=86,89,120" >> $GITHUB_ENV
          echo "NEXTEST_ENV=CUDA_OPT_LEVEL=3" >> $GITHUB_ENV
          echo "FEATURE_ARGS=--features=cuda" >> $GITHUB_ENV

      - name: Run guest library tests
        env:
          FILTER_OUTPUTS: ${{ toJSON(steps.filter.outputs) }}
        run: |
          COMMON_CHANGED=$(echo $FILTER_OUTPUTS | jq -r .common)
          "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"

          for crate in ${{ matrix.crates.names }}; do
            crate_changed=$(echo $FILTER_OUTPUTS | jq -r --arg c "$crate" '.[$c]')
            if [[ "$COMMON_CHANGED" == "true" || "$crate_changed" == "true" ]]; then
              echo "::group::Running tests for $crate"

              # Run guest library tests
              if [ -d "guest-libs/$crate" ]; then
                TEST_DIR="guest-libs/$crate"
                if [[ "$crate" == "verify-stark" ]]; then
                  TEST_DIR="guest-libs/$crate/circuit"
                fi
                pushd $TEST_DIR

                # Handle special feature args for pairing crate
                SPECIAL_ARGS=""
                if [[ "$crate" == "pairing" ]]; then
                  SPECIAL_ARGS="--features=bn254,bls12_381"
                elif [[ "$crate" == "sha2" || "$crate" == "keccak256" ]]; then
                  # also run proving tests
                  SPECIAL_ARGS="--run-ignored=all"
                fi

                ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast ${{ env.FEATURE_ARGS }} $SPECIAL_ARGS --no-tests=pass --test-threads=1
                popd
              fi
              echo "::endgroup::"
            else
              echo "Skipping tests for $crate as no relevant files changed."
            fi
          done

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
