name: Guest Library Tests (CUDA)

on:
  workflow_call:
  push:
    branches: ["main"]
    paths: &guest_lib_cuda_test_paths
      - "crates/circuits/**"
      - "crates/vm/**"
      - "crates/toolchain/**"
      - "crates/sdk/**"
      - "crates/recursion/**"
      - "crates/continuations/**"
      - "crates/verify/**"
      - "crates/rvr/**"
      - "extensions/riscv/**"
      - "extensions/riscv-adapters/**"
      - "extensions/deferral/**"
      - "extensions/keccak256/**"
      - "extensions/sha2/**"
      - "extensions/algebra/**"
      - "extensions/ecc/**"
      - "extensions/pairing/**"
      - "guest-libs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/config.toml"
      - ".github/actions/sccache/**"
      - ".github/actions/rust-cache-cuda/**"
      - ".github/filters/guest-lib-tests.yml"
      - ".github/workflows/guest-lib-tests.group.yml"
      - ".github/workflows/guest-lib-tests.cuda.yml"
      - "crates/sdk/guest/fib/**"
      - "ci/install-openvm-toolchain.sh"
      - "scripts/gpu_driver_setup.sh"
  pull_request:
    branches: ["**"]
    paths: *guest_lib_cuda_test_paths

concurrency:
  group: ${{ github.workflow_ref }}-guest-lib-tests-cuda-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  changes:
    name: Select affected groups
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      crates: ${{ steps.tests.outputs.changes }}
      cuda: ${{ steps.tests.outputs.cuda }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: tests
        with:
          filters: .github/filters/guest-lib-tests.yml

  hashes-cuda:
    name: hashes
    needs: changes
    if: needs.changes.outputs.cuda == 'true' || contains(fromJSON(needs.changes.outputs.crates), 'sha2') || contains(fromJSON(needs.changes.outputs.crates), 'keccak256')
    uses: ./.github/workflows/guest-lib-tests.group.yml
    with:
      runner_id: cuda-hashes
      crates: ${{ needs.changes.outputs.cuda == 'true' && 'all' || join(fromJSON(needs.changes.outputs.crates), ' ') }}
      mode: cuda
      group_crates: sha2 keccak256
    secrets: inherit

  verify-stark-cuda:
    name: verify-stark
    needs: changes
    if: needs.changes.outputs.cuda == 'true' || contains(fromJSON(needs.changes.outputs.crates), 'verify-stark')
    uses: ./.github/workflows/guest-lib-tests.group.yml
    with:
      runner_id: cuda-verify-stark
      crates: ${{ needs.changes.outputs.cuda == 'true' && 'all' || join(fromJSON(needs.changes.outputs.crates), ' ') }}
      mode: cuda
      group_crates: verify-stark
    secrets: inherit

  curves-cuda:
    name: curves
    needs: changes
    if: needs.changes.outputs.cuda == 'true' || contains(fromJSON(needs.changes.outputs.crates), 'k256') || contains(fromJSON(needs.changes.outputs.crates), 'p256')
    uses: ./.github/workflows/guest-lib-tests.group.yml
    with:
      runner_id: cuda-curves
      crates: ${{ needs.changes.outputs.cuda == 'true' && 'all' || join(fromJSON(needs.changes.outputs.crates), ' ') }}
      mode: cuda
      group_crates: k256 p256
    secrets: inherit

  algebra-cuda:
    name: algebra
    needs: changes
    if: needs.changes.outputs.cuda == 'true' || contains(fromJSON(needs.changes.outputs.crates), 'ff_derive') || contains(fromJSON(needs.changes.outputs.crates), 'pairing')
    uses: ./.github/workflows/guest-lib-tests.group.yml
    with:
      runner_id: cuda-algebra
      crates: ${{ needs.changes.outputs.cuda == 'true' && 'all' || join(fromJSON(needs.changes.outputs.crates), ' ') }}
      mode: cuda
      group_crates: ff_derive pairing
    secrets: inherit
