name: Guest Library Tests (CUDA)

on:
  workflow_call:
  push:
    branches: ["main"]
    paths: &guest_lib_cuda_test_paths
      - "crates/circuits/**"
      - "crates/vm/**"
      - "crates/toolchain/**"
      - "crates/sdk/**"
      - "crates/recursion/**"
      - "crates/continuations/**"
      - "crates/verify/**"
      - "crates/rvr/**"
      - "extensions/riscv/**"
      - "extensions/riscv-adapters/**"
      - "extensions/deferral/**"
      - "extensions/keccak256/**"
      - "extensions/sha2/**"
      - "extensions/algebra/**"
      - "extensions/ecc/**"
      - "extensions/pairing/**"
      - "guest-libs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/config.toml"
      - ".github/actions/sccache/**"
      - ".github/actions/rust-cache-cuda/**"
      - ".github/filters/guest-lib-tests.yml"
      - ".github/workflows/guest-lib-tests.cuda*.yml"
      - "crates/sdk/guest/fib/**"
      - "ci/install-openvm-toolchain.sh"
      - "scripts/gpu_driver_setup.sh"
  pull_request:
    branches: ["**"]
    paths: *guest_lib_cuda_test_paths

concurrency:
  group: ${{ github.workflow_ref }}-guest-lib-tests-cuda-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  changes:
    name: Select CUDA guest library tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      cuda: ${{ steps.tests.outputs.cuda }}
      sha2: ${{ steps.tests.outputs.sha2 }}
      keccak256: ${{ steps.tests.outputs.keccak256 }}
      ff_derive: ${{ steps.tests.outputs.ff_derive }}
      k256: ${{ steps.tests.outputs.k256 }}
      p256: ${{ steps.tests.outputs.p256 }}
      pairing: ${{ steps.tests.outputs.pairing }}
      verify_stark: ${{ steps.tests.outputs['verify-stark'] }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: tests
        with:
          filters: .github/filters/guest-lib-tests.yml

  hashes-cuda:
    name: CUDA guest hashes
    needs: changes
    if: needs.changes.outputs.cuda == 'true' || needs.changes.outputs.sha2 == 'true' || needs.changes.outputs.keccak256 == 'true'
    uses: ./.github/workflows/guest-lib-tests.cuda.group.yml
    with:
      group: hashes
      sha2: ${{ needs.changes.outputs.cuda == 'true' || needs.changes.outputs.sha2 == 'true' }}
      keccak256: ${{ needs.changes.outputs.cuda == 'true' || needs.changes.outputs.keccak256 == 'true' }}
    secrets: inherit

  verify-stark-cuda:
    name: CUDA guest verify-stark
    needs: changes
    if: needs.changes.outputs.cuda == 'true' || needs.changes.outputs.verify_stark == 'true'
    uses: ./.github/workflows/guest-lib-tests.cuda.group.yml
    with:
      group: verify-stark
      verify_stark: true
    secrets: inherit

  curves-cuda:
    name: CUDA guest curves
    needs: changes
    if: needs.changes.outputs.cuda == 'true' || needs.changes.outputs.k256 == 'true' || needs.changes.outputs.p256 == 'true'
    uses: ./.github/workflows/guest-lib-tests.cuda.group.yml
    with:
      group: curves
      k256: ${{ needs.changes.outputs.cuda == 'true' || needs.changes.outputs.k256 == 'true' }}
      p256: ${{ needs.changes.outputs.cuda == 'true' || needs.changes.outputs.p256 == 'true' }}
    secrets: inherit

  algebra-cuda:
    name: CUDA guest algebra
    needs: changes
    if: needs.changes.outputs.cuda == 'true' || needs.changes.outputs.ff_derive == 'true' || needs.changes.outputs.pairing == 'true'
    uses: ./.github/workflows/guest-lib-tests.cuda.group.yml
    with:
      group: algebra
      ff_derive: ${{ needs.changes.outputs.cuda == 'true' || needs.changes.outputs.ff_derive == 'true' }}
      pairing: ${{ needs.changes.outputs.cuda == 'true' || needs.changes.outputs.pairing == 'true' }}
    secrets: inherit
