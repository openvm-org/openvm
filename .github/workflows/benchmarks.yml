name: Benchmarks

on:
  workflow_call:
    inputs:
      is_merge_queue:
        description: "Whether this is being called from merge queue"
        required: false
        type: boolean
        default: false
  push:
    branches: ["main"]
    paths: &benchmark_paths
      - "benchmarks/prove/**"
      - "benchmarks/guest/**"
      - "crates/**"
      - "extensions/**"
      - ".github/workflows/benchmark-call.yml"
      - ".github/workflows/benchmarks.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["**"]
    paths: *benchmark_paths
  workflow_dispatch:
    inputs:
      flamegraphs:
        type: boolean
        description: Collect profiling metrics and generate flamegraphs
        required: false
        default: false
      run-benchmark-e2e:
        type: boolean
        description: "Run end-to-end benchmarks"
        required: false
        default: false

concurrency:
  group: benchmarks-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  CARGO_TERM_COLOR: always
  CURRENT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  REPO: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  S3_ENABLED: ${{ vars.OPENVM_S3_DATA_BUCKET != '' }}
  S3_METRICS_PATH: s3://${{ vars.OPENVM_S3_DATA_BUCKET }}/benchmark/github/metrics
  FEATURE_FLAGS: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  create-matrix:
    name: Select benchmarks
    if: ${{ github.event.action != 'labeled' || github.event.label.name == 'run-benchmark' || github.event.label.name == 'run-benchmark-e2e' }}
    runs-on:
      - runs-on=${{ github.run_id }}/family=c8i-flex.2xlarge+c8i.2xlarge+c8a.2xlarge+c7i.2xlarge+c7a.2xlarge/image=ubuntu24-full-x64/volume=40gb
    outputs:
      matrix: ${{ steps.create-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.CURRENT_SHA }}
          repository: ${{ env.REPO }}

      - name: Create benchmark matrix from JSON
        id: create-matrix
        run: |
          if [ ! -f ./ci/benchmark-config.json ]; then
            echo "Error: ./ci/benchmark-config.json not found"
            exit 1
          fi
          cat ./ci/benchmark-config.json

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            RUN_E2E=${{ contains(github.event.pull_request.labels.*.name, 'run-benchmark-e2e') }}
          else
            RUN_E2E=${{ github.event.inputs.run-benchmark-e2e || 'false' }}
          fi
          if [[ "${{ github.event.inputs.flamegraphs }}" == "true" ]]; then
            FEATURE_FLAGS="perf-metrics,${FEATURE_FLAGS}"
          fi

          matrix=$(jq -c --argjson run_e2e $RUN_E2E --arg features "$FEATURE_FLAGS" '
            [
              .benchmarks[] |
              .name as $name |
              .id as $id |
              .e2e_bench as $e2e_bench |
              select($run_e2e or .e2e_bench != true) |
              .run_params[] |
              {
                name: $name,
                e2e_bench: $e2e_bench,
                features: $features,
                id: $id,
                instance_type: .instance_type,
                memory_allocator: .memory_allocator
              }
            ]
          ' ./ci/benchmark-config.json)
          if [ $? -ne 0 ]; then
            echo "Error: Failed to parse ./ci/benchmark-config.json"
            exit 1
          fi
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  benchmark:
    name: ${{ format('{0}{1} | {2} | {3}', matrix.benchmark_run.name, matrix.benchmark_run.e2e_bench && ' (E2E)' || '', matrix.benchmark_run.instance_type, matrix.benchmark_run.memory_allocator) }}
    needs: create-matrix
    strategy:
      matrix:
        benchmark_run: ${{fromJson(needs.create-matrix.outputs.matrix)}}
    uses: ./.github/workflows/benchmark-call.yml
    with:
      benchmark_name: ${{ matrix.benchmark_run.name }}
      benchmark_id: ${{ matrix.benchmark_run.id }}
      instance_type: ${{ matrix.benchmark_run.instance_type }}
      memory_allocator: ${{ matrix.benchmark_run.memory_allocator }}
      e2e_bench: ${{ matrix.benchmark_run.e2e_bench || false }}
      features: ${{ matrix.benchmark_run.features }}
      is_merge_queue: ${{ inputs.is_merge_queue || false }}
      job_index: ${{ strategy.job-index }}
    secrets: inherit

  summarize:
    name: Report results
    needs: [create-matrix, benchmark]
    runs-on:
      - runs-on=${{ github.run_id }}/family=c8i-flex.2xlarge+c8i.2xlarge+c8a.2xlarge+c7i.2xlarge+c7a.2xlarge/image=ubuntu24-full-x64/volume=40gb/extras=s3-cache
    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.CURRENT_SHA }}
          repository: ${{ env.REPO }}

      - name: Install s5cmd
        if: ${{ env.S3_ENABLED == 'true' }}
        run: bash ci/scripts/install-s5cmd.sh

      - name: Download current benchmark metrics
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-metrics-*
          path: .bench_metrics/current
          merge-multiple: true

      - name: Download current benchmark flamegraphs
        if: ${{ github.event.inputs.flamegraphs == 'true' }}
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-flamegraphs-*
          path: .bench_metrics/flamegraphs
      - uses: dtolnay/rust-toolchain@stable
      - name: Configure sccache
        run: |
          printf 'server_startup_timeout_ms = 60000\n' > "$RUNNER_TEMP/sccache.conf"
          echo "SCCACHE_CONF=$RUNNER_TEMP/sccache.conf" >> "$GITHUB_ENV"
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build openvm-prof
        run: |
          cargo build --locked -p openvm-prof
          echo "${{ github.workspace }}/target/debug" >> $GITHUB_PATH

      - name: Set github pages path for dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          BENCHMARK_REF: ${{ github.head_ref || github.ref }}
        run: |
          BENCHMARK_RESULTS_PATH="benchmarks-dispatch/${BENCHMARK_REF}"
          echo "BENCHMARK_RESULTS_PATH=${BENCHMARK_RESULTS_PATH}" >> $GITHUB_ENV

      - name: Set github pages path for PR
        if: github.event_name == 'pull_request'
        run: |
          BENCHMARK_RESULTS_PATH="benchmarks-pr/${{ github.event.pull_request.number }}"
          echo "BENCHMARK_RESULTS_PATH=${BENCHMARK_RESULTS_PATH}" >> $GITHUB_ENV

      - name: Set github pages path for push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          BENCHMARK_RESULTS_PATH="benchmarks"
          echo "BENCHMARK_RESULTS_PATH=${BENCHMARK_RESULTS_PATH}" >> $GITHUB_ENV

      - name: Set github pages path for merge queue
        if: inputs.is_merge_queue == true
        run: |
          BENCHMARK_RESULTS_PATH="benchmarks"
          echo "BENCHMARK_RESULTS_PATH=${BENCHMARK_RESULTS_PATH}" >> $GITHUB_ENV

      - name: Render current benchmark artifacts
        run: |
          matrix='${{ needs.create-matrix.outputs.matrix }}'
          names_list=$(jq -r 'map(.id) | join(",")' <<< "$matrix")

          json_files=$(jq -r '
            .[] |
            ".bench_metrics/current/\(.id).json"' <<< "$matrix")
          json_file_list=$(echo -n "$json_files" | paste -sd "," -)
          echo "$json_file_list"

          # For PRs, get the latest commit from the target branch
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ github.base_ref }}" == "main" ]]; then
              REF_HASH="main"
            else
              REF_HASH=$(echo "refs/heads/${{ github.base_ref }}" | sha256sum | cut -d' ' -f1)
            fi
            echo "Target branch REF_HASH: $REF_HASH"
          else
            # For merge_group and push events, use "main" as reference
            REF_HASH="main"
          fi

          mkdir -p .bench_metrics/baselines
          prev_json_files=$(jq -r --arg target "$REF_HASH" '
            .[] |
            ".bench_metrics/baselines/\($target)-\(.id).json"' <<< "$matrix")
          prev_json_file_list=$(echo -n "$prev_json_files" | paste -sd "," -)
          echo "$prev_json_file_list"

          if [[ "${S3_ENABLED}" == "true" ]]; then
            while IFS= read -r json_file; do
              if [[ -z "$json_file" ]]; then
                continue
              fi
              s3_name=$(basename "$json_file")
              echo "Downloading historical baseline: $s3_name"
              if ! s5cmd cp "${{ env.S3_METRICS_PATH }}/${s3_name}" "${json_file}"; then
                echo "Warning: Failed to download ${s3_name}, skipping..."
              fi
            done <<< "$prev_json_files"
          else
            echo "S3 is not configured; rendering without historical baselines."
          fi

          openvm-prof --json-paths "${json_file_list}" \
            --prev-json-paths "${prev_json_file_list}" \
            --names "${names_list}" \
            summary \
            --benchmark-results-link "https://github.com/${{ github.repository }}/blob/benchmark-results/${BENCHMARK_RESULTS_PATH}" \
            --summary-md-path summary.md

          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${CURRENT_SHA}"
          BENCHMARK_WORKFLOW_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TMP_DIR="${RUNNER_TEMP}/benchmark-results/${CURRENT_SHA}"
          echo "TMP_DIR=${TMP_DIR}" >> "$GITHUB_ENV"
          mkdir -p "$TMP_DIR"

          while IFS= read -r metric_path; do
            benchmark_id=$(basename "${metric_path%.json}")
            inputs=$(jq -cer --arg id "$benchmark_id" \
              'first(.[] | select(.id == $id)) // error("missing benchmark metadata for " + $id)' \
              <<< "$matrix")
            instance_type=$(jq -r '.instance_type' <<< "$inputs")
            memory_allocator=$(jq -r '.memory_allocator' <<< "$inputs")
            md_path="${metric_path%.json}.md"
            detailed_md_path="${md_path%.md}.detailed.md"

            {
              printf '\n<details>\n<summary>Detailed Metrics</summary>\n\n'
              cat "$detailed_md_path"
              printf '</details>\n\n'
            } >> "$md_path"

            metadata_args=(
              --markdown "$md_path"
              --instance-type "$instance_type"
              --memory-allocator "$memory_allocator"
              --commit-url "$COMMIT_URL"
              --workflow-url "$BENCHMARK_WORKFLOW_URL"
            )
            flamegraph_dir=".bench_metrics/flamegraphs/benchmark-flamegraphs-${benchmark_id}"
            if [[ -d "$flamegraph_dir" ]]; then
              shopt -s nullglob
              flamegraphs=("$flamegraph_dir"/*.svg)
              shopt -u nullglob
              if ((${#flamegraphs[@]})); then
                metadata_args+=(
                  --flamegraph-dir "$flamegraph_dir"
                  --flamegraph-link-prefix "flamegraphs/${benchmark_id}"
                )
                mkdir -p "${TMP_DIR}/flamegraphs/${benchmark_id}"
                cp "${flamegraphs[@]}" "${TMP_DIR}/flamegraphs/${benchmark_id}/"
              fi
            fi
            bash ci/scripts/append-benchmark-metadata.sh "${metadata_args[@]}"

            cp "$md_path" "$detailed_md_path" "$TMP_DIR/"
            memory_svg_path="${md_path%.md}.memory.svg"
            if [[ -f "$memory_svg_path" ]]; then
              cp "$memory_svg_path" "$TMP_DIR/"
            fi
          done <<< "$json_files"

          echo "" >> summary.md
          echo "Commit: $COMMIT_URL" >> summary.md
          echo "" >> summary.md
          echo "[Benchmark Workflow]($BENCHMARK_WORKFLOW_URL)" >> summary.md

          cp summary.md "$TMP_DIR/"

      ##########################################################################
      # Update benchmark-results branch with summary                           #
      ##########################################################################
      - uses: actions/checkout@v5
        with:
          ref: benchmark-results

      - name: Set up git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Update github pages with new bench results
        if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) || (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch') || inputs.is_merge_queue == true
        run: |
          mkdir -p "${BENCHMARK_RESULTS_PATH}"
          cp -R "${TMP_DIR}/." "${BENCHMARK_RESULTS_PATH}/"
          git add "${BENCHMARK_RESULTS_PATH}"
          # Update index.md for both push to main and merge_queue events
          if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ inputs.is_merge_queue }}" == "true" ]]; then
            cp ${TMP_DIR}/summary.md index.md
            git add index.md
          fi
          git commit --allow-empty -m "Update benchmark results at ${{ env.CURRENT_SHA }}"

          MAX_RETRIES=10
          RETRY_DELAY=5
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
              echo "Attempt $((ATTEMPT + 1)) to push of $MAX_RETRIES..."
              git fetch origin benchmark-results
              git merge origin/benchmark-results --no-edit
              if git push origin benchmark-results; then
                  SUCCESS=true
                  break
              else
                  echo "Push failed. Retrying in $RETRY_DELAY seconds..."
                  sleep $RETRY_DELAY
                  ATTEMPT=$((ATTEMPT + 1))
              fi
          done
          if [ "$SUCCESS" = false ]; then
              echo "PUSH_FAILED"
              exit 1
          fi

      - name: Link to Benchmark Results
        run: |
          echo "Benchmark results are available at:"
          echo "https://github.com/${{ github.repository }}/blob/benchmark-results/${BENCHMARK_RESULTS_PATH}/summary.md"

      ##########################################################################
      # Update PR comment upon a pull request event                            #
      ##########################################################################
      - name: Collapse previous comment (if exists)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            for (const comment of comments.data) {
              if (comment.user.login == "github-actions[bot]" && comment.body.startsWith("<!--Benchmark Results-->")) {
                console.log("collapse comment ", comment.id);
                const resp = await github.graphql(`
                  mutation {
                    minimizeComment(input: {classifier: OUTDATED, subjectId: "${comment.node_id}"}) {
                      minimizedComment {
                        isMinimized
                      }
                    }
                  }
                `);
              }
            }

      - name: Add comment to pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const newBenchmark = fs.readFileSync('${{ env.TMP_DIR }}/summary.md', { encoding: 'utf8', flag: 'r' })

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `<!--Benchmark Results-->\n${newBenchmark}`
            });

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
