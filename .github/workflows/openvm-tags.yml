name: Check that tags are everywhere in the docs

on:
  workflow_call:
  push:
    branches: ["main"]
    tags:
      - v*.*.*
  pull_request:
    branches: [main]
    paths:
      - "docs"
      - ".github/workflows/openvm-tags.yml"
      - "ci/scripts/check_openvm_tags.sh"

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  docs:
    permissions:
      contents: write
      packages: read
    concurrency:
      group: ${{ github.workflow_ref }}-docs-${{ github.ref }}
    runs-on:
      - runs-on=${{ github.run_id }}/runner=8cpu-linux-x64
    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - name: Check the tags
        working-directory: docs
        run: ../ci/scripts/check_openvm_tags.sh .
