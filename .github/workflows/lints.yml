name: Lint Workspace
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  workflow_call:
concurrency:
  group: ${{ github.workflow_ref }}-lints-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true
jobs:
  changes:
    name: Detect CUDA changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      cuda: ${{ steps.filter.outputs.cuda }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cuda:
              - '**/*.rs'
              - '**/*.cu'
              - '**/*.cuh'
              - '**/cuda/**'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/config.toml'
              - 'scripts/gpu_driver_setup.sh'
              - '.github/workflows/lints.yml'
              - '.github/actions/sccache/**'
              - '.github/actions/rust-cache-cuda/**'
  lint:
    name: Lint
    runs-on:
      - runs-on=${{ github.run_id }}-cpu/family=c9g.8xlarge+c8g.8xlarge+m9g.8xlarge+m8g.8xlarge/image=ubuntu24-full-arm64/volume=80gb/extras=s3-cache
    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - uses: codespell-project/actions-codespell@v2
        with:
          skip: Cargo.lock,./docs/vocs/pnpm-lock.yaml,*.txt,./crates/toolchain/openvm/src/memcpy.s,./crates/toolchain/openvm/src/memset.s,./audits/*.pdf
          ignore_words_file: .codespellignore
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/sccache
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: v1

      - name: Run fmt
        run: |
          rustup install nightly
          rustup component add --toolchain nightly rustfmt
          cargo +nightly fmt --all -- --check
      - name: Run clippy
        run: |
          # list of all unique features across workspace generated using:
          # cargo metadata --format-version=1 --no-deps | jq -r '.packages[].features | to_entries[] | .key' | sort -u | tr '\n' ' ' && echo ""
          # (exclude mimalloc since it conflicts with jemalloc)
          # cargo clippy --all-targets --all --tests --features "aggregation bls12_381 bn254 build-elfs default entrypoint evm-prove evm-verify export-intrinsics export-libm function-span getrandom-unsupported halo2-compiler halo2curves heap-embedded-alloc jemalloc jemalloc-prof metrics panic-handler parallel perf-metrics rust-runtime static-verifier std test-utils" -- -D warnings
          cargo clippy --all-targets --all --tests --features "bls12_381 bn254 default entrypoint export-intrinsics export-libm function-span getrandom-unsupported halo2curves heap-embedded-alloc jemalloc jemalloc-prof metrics panic-handler parallel perf-metrics rust-runtime std test-utils" -- -D warnings
          # cargo clippy --all-targets --all --tests --no-default-features --features "mimalloc" -- -D warnings
          cargo clippy --all-targets --all --tests --no-default-features --features "mimalloc" -- -D warnings
      - name: Run fmt, clippy for guest
        run: |
          # Find all directories named "programs" and include additional static paths
          for crate_path in $(find . -type d -name "programs" -exec find {} -mindepth 0 -maxdepth 0 -type d \;) examples/*; do
            # Check if Cargo.toml exists in the directory
            if [ -f "$crate_path/Cargo.toml" ]; then
              echo "Running cargo fmt, clippy for $crate_path"
              cargo +nightly fmt --manifest-path "$crate_path/Cargo.toml" --all -- --check
              if [[ "$crate_path" == *"guest-libs/pairing/tests/programs"* ]]; then
                echo "Running cargo clippy with openvm_pairing_guest::bn254 feature for $crate_path"
                cargo clippy --manifest-path "$crate_path/Cargo.toml" --all-targets --features "std bn254" -- -D warnings
                echo "Running cargo clippy with openvm_pairing_guest::bls12_381 feature for $crate_path"
                cargo clippy --manifest-path "$crate_path/Cargo.toml" --all-targets --features "std bls12_381" -- -D warnings
              elif [[ "$crate_path" == *"extensions/"* || "$crate_path" == *"guest-libs/"* ]]; then
                echo "Running cargo clippy with std feature for $crate_path"
                cargo clippy --manifest-path "$crate_path/Cargo.toml" --all-targets --features "std" -- -D warnings
              else
                echo "Running cargo clippy for $crate_path"
                cargo clippy --manifest-path "$crate_path/Cargo.toml" --all-targets -- -D warnings
              fi
            else
              echo "Skipping $crate_path as it does not contain a Cargo.toml"
            fi
          done
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      - name: Cargo shear
        run: |
          cargo binstall --no-confirm --force cargo-shear --version 1.1.11
          cargo shear
      - name: Cargo audit
        run: |
          cargo binstall --no-confirm --force cargo-audit
          cargo audit

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  docs:
    name: Check docs
    runs-on:
      - runs-on=${{ github.run_id }}-docs/family=c8i-flex.8xlarge+c8i.8xlarge+c8a.8xlarge+c7i.8xlarge+c7a.8xlarge/image=ubuntu24-full-x64/volume=80gb/extras=s3-cache
    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/sccache
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: v1

      - name: Generate docs
        # full docs with dependencies are built by docs.yml on main/tags
        run: |
          cargo doc --workspace --no-deps --exclude "openvm-benchmarks*" --exclude "*-tests"
        env:
          RUSTDOCFLAGS: -D warnings

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  lint-cuda:
    name: Lint CUDA
    needs: changes
    if: ${{ needs.changes.outputs.cuda == 'true' }}
    runs-on:
      - runs-on=${{ github.run_id }}-cuda/image=ubuntu24-gpu-x64/family=g7.2xlarge+g6.2xlarge+g5.2xlarge/volume=40gb/spot=price-capacity-optimized/extras=s3-cache
    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_PERMIT_COPY_RENAME: "1"
      - uses: ./.github/actions/sccache
      # TODO: remove once https://github.com/runs-on/runner-images-for-aws/issues/55 is fixed
      - name: Setup GPU driver
        run: bash ./scripts/gpu_driver_setup.sh
      - uses: ./.github/actions/rust-cache-cuda
        with:
          cache-on-failure: true
      - name: Verify GPU setup
        run: |
          nvidia-smi
          nvidia-smi -L
          echo "CUDA_ARCH=86,89,120" >> $GITHUB_ENV
      - name: Run clippy
        run: |
          # includes GPU specific features cuda and touchemall
          # cargo clippy --all-targets --all --tests --features "aggregation bls12_381 bn254 build-elfs cuda default entrypoint evm-prove evm-verify export-intrinsics export-libm function-span getrandom-unsupported halo2-compiler halo2curves heap-embedded-alloc jemalloc jemalloc-prof metrics panic-handler parallel perf-metrics rust-runtime static-verifier std test-utils touchemall" -- -D warnings
          cargo clippy --all-targets --all --tests --features "bls12_381 bn254 cuda default entrypoint export-intrinsics export-libm function-span getrandom-unsupported halo2curves heap-embedded-alloc jemalloc jemalloc-prof metrics panic-handler parallel perf-metrics rust-runtime std test-utils touchemall" -- -D warnings
      # TODO: re-enable after stark-backend Fp() default constructor is __host__ __device__
      # - name: Run clang-tidy
      #   run: |
      #     set -eux
      #     wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
      #     echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" | sudo tee /etc/apt/sources.list.d/llvm-toolchain.list
      #     sudo apt-get update
      #     sudo apt-get install -y clang-tidy-21
      #     ./scripts/run_clang_tidy.sh

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
