name: Build and Serve Crate Docs

on:
  workflow_call:
  push:
    branches: ["main"]
    tags:
      - v*.*.*
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for S3 bucket"
        required: true

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  docs:
    name: Build and publish
    permissions:
      contents: write
      packages: read
    concurrency:
      group: ${{ github.workflow_ref }}-docs-${{ github.ref }}
    runs-on:
      - runs-on=${{ github.run_id }}/image=ubuntu24-gpu-x64/family=g7.2xlarge+g6.2xlarge+g5.2xlarge/volume=40gb/spot=price-capacity-optimized/extras=s3-cache
    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - name: Init rvr FFI submodules
        run: |
          git submodule update --init --depth 1 extensions/keccak256/rvr/ffi/openssl
          git submodule update --init --depth 1 extensions/algebra/rvr/ffi/modular/secp256k1
          git submodule update --init --depth 1 extensions/algebra/rvr/ffi/modular/blst
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
      - uses: ./.github/actions/sccache
      # TODO: remove once https://github.com/runs-on/runner-images-for-aws/issues/55 is fixed
      - name: Setup GPU driver
        run: bash ./scripts/gpu_driver_setup.sh
      - name: Verify GPU setup
        run: |
          nvidia-smi
          nvidia-smi -L
          echo "CUDA_ARCH=86,89,120" >> $GITHUB_ENV

      - name: Build documentation
        run: cargo +nightly-2026-01-18 doc --workspace --no-deps --exclude "openvm-benchmarks*" --exclude "*-tests" --features "cuda"
        env:
          RUSTDOCFLAGS: -D warnings --enable-index-page -Zunstable-options

      - name: Install s5cmd
        if: github.event_name != 'pull_request'
        run: |
          source ci/scripts/utils.sh
          install_s5cmd

      - name: Sync static S3 bucket
        working-directory: target/doc
        if: github.ref_type == 'branch' && github.ref == 'refs/heads/main'
        env:
          S3_BUCKET: ${{ vars.CRATE_DOCS_S3_BUCKET }}
        run: s5cmd sync --delete . s3://${S3_BUCKET%/}/static/

      - name: Sync tagged version S3 bucket
        working-directory: target/doc
        if: github.ref_type == 'tag'
        env:
          S3_BUCKET: ${{ vars.CRATE_DOCS_S3_BUCKET }}
        run: s5cmd sync --delete . s3://${S3_BUCKET%/}/${{ github.ref_name }}/

      - name: Sync tagged version S3 bucket
        working-directory: target/doc
        if: github.event_name == 'workflow_dispatch'
        env:
          S3_BUCKET: ${{ vars.CRATE_DOCS_S3_BUCKET }}
        run: s5cmd sync --delete . s3://${S3_BUCKET%/}/${{ github.event.inputs.tag }}/

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
