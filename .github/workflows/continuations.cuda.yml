name: CUDA Continuations Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
    paths:
      - "crates/continuations/**"
      - "crates/recursion/**"
      - ".github/workflows/continuations.cuda.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cuda-backend:
    name: continuations cuda tests
    runs-on:
      - runs-on=${{ github.run_id }}/image=ubuntu24-gpu-x64/family=g7e.2xlarge+g7.2xlarge+g6e.2xlarge/volume=40gb/spot=capacity-optimized/extras=s3-cache
    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_PERMIT_COPY_RENAME: "1"
      - uses: ./.github/actions/sccache

      # TODO: remove once https://github.com/runs-on/runner-images-for-aws/issues/55 is fixed
      - name: Setup GPU driver
        run: bash ./scripts/gpu_driver_setup.sh

      - uses: ./.github/actions/rust-cache-cuda
      - uses: taiki-e/install-action@nextest

      - name: Verify GPU setup
        run: |
          nvidia-smi
          nvidia-smi -L
          nvcc --version
          echo "CUDA_ARCH=86,89,120" >> $GITHUB_ENV

      - name: Setup CUDA environment
        run: |
          # Find the actual CUDA library location
          CUDART_PATH=$(find /usr/local -name "libcudart.so" | head -1)
          if [ -n "$CUDART_PATH" ]; then
            CUDA_LIB_DIR=$(dirname "$CUDART_PATH")
            echo "CUDA libraries found at: $CUDA_LIB_DIR"
            echo "CUDA_LIB_DIR=$CUDA_LIB_DIR" >> $GITHUB_ENV
          else
            echo "CUDA libraries not found!"
            exit 1
          fi

      - name: Run continuations CUDA tests
        working-directory: crates/continuations
        run: |
          "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"
          cargo nextest run --cargo-profile=fast --features cuda,root-prover --profile=heavy -E 'not test(e2e)'

      - name: Run continuations CUDA e2e test
        working-directory: crates/continuations
        run: cargo nextest run --cargo-profile=fast --features cuda,root-prover --test-threads=1 -E 'test(e2e)'

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
