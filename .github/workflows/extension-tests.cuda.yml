name: Extension Tests (CUDA)

on:
  workflow_call:
  push:
    branches: ["main"]
    paths:
      - "crates/circuits/**"
      - "crates/vm/**"
      - "crates/toolchain/**"
      - "crates/sdk/**"
      - "crates/sdk-config/**"
      - "crates/rvr/**"
      - "extensions/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/filters/extension-tests.yml"
      - ".github/workflows/extension-tests.cuda.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "crates/circuits/**"
      - "crates/vm/**"
      - "crates/toolchain/**"
      - "crates/sdk/**"
      - "crates/sdk-config/**"
      - "crates/rvr/**"
      - "extensions/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/filters/extension-tests.yml"
      - ".github/workflows/extension-tests.cuda.yml"
  workflow_dispatch:
    inputs:
      machine_type:
        description: "Runner label fragment (e.g. image=ubuntu24-gpu-x64/family=g7.2xlarge+g6.2xlarge+g5.2xlarge/volume=40gb/spot=price-capacity-optimized)"
        required: false
        default: image=ubuntu24-gpu-x64/family=g7.2xlarge+g6.2xlarge+g5.2xlarge/volume=40gb/spot=price-capacity-optimized

concurrency:
  group: ${{ github.workflow_ref }}-extension-tests-cuda-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  changes:
    name: Select CUDA extension tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      groups: ${{ github.event_name == 'workflow_dispatch' && '["riscv","extensions"]' || steps.groups.outputs.changes }}
      riscv: ${{ steps.tests.outputs.riscv }}
      keccak256: ${{ steps.tests.outputs.keccak256 }}
      sha2: ${{ steps.tests.outputs.sha2 }}
      bigint: ${{ steps.tests.outputs.bigint }}
      algebra: ${{ steps.tests.outputs.algebra }}
      ecc: ${{ steps.tests.outputs.ecc }}
      pairing: ${{ steps.tests.outputs.pairing }}
      deferral: ${{ steps.tests.outputs.deferral }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: groups
        with:
          filters: |
            riscv:
              - "crates/circuits/**"
              - "crates/vm/**"
              - "crates/toolchain/**"
              - "crates/rvr/**"
              - "extensions/riscv/**"
              - "Cargo.toml"
              - "Cargo.lock"
              - ".github/filters/extension-tests.yml"
              - ".github/workflows/extension-tests.cuda.yml"
            extensions:
              - "crates/circuits/**"
              - "crates/vm/**"
              - "crates/toolchain/**"
              - "crates/sdk/**"
              - "crates/sdk-config/**"
              - "crates/rvr/**"
              - "extensions/riscv/**"
              - "extensions/riscv-adapters/**"
              - "extensions/keccak256/**"
              - "extensions/sha2/**"
              - "extensions/bigint/**"
              - "extensions/algebra/**"
              - "extensions/ecc/**"
              - "extensions/pairing/**"
              - "extensions/deferral/**"
              - "Cargo.toml"
              - "Cargo.lock"
              - ".github/filters/extension-tests.yml"
              - ".github/workflows/extension-tests.cuda.yml"
      - uses: dorny/paths-filter@v3
        id: tests
        with:
          filters: .github/filters/extension-tests.yml

  extension-tests-cuda:
    needs: changes
    if: needs.changes.outputs.groups != '[]'
    name: ${{ format('CUDA ({0})', matrix.group) }}
    strategy:
      matrix:
        group: ${{ fromJSON(needs.changes.outputs.groups) }}
    runs-on:
      - runs-on=${{ github.run_id }}-extension-tests-cuda-${{ github.run_attempt }}-${{ strategy.job-index }}/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.machine_type || 'image=ubuntu24-gpu-x64/family=g7.2xlarge+g6.2xlarge+g5.2xlarge/volume=40gb/spot=price-capacity-optimized' }}/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_PERMIT_COPY_RENAME: "1"
      - uses: ./.github/actions/sccache

      # TODO: remove once https://github.com/runs-on/runner-images-for-aws/issues/55 is fixed
      - name: Setup GPU driver
        run: bash ./scripts/gpu_driver_setup.sh

      - uses: ./.github/actions/rust-cache-cuda
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest

      - name: Check CUDA status and set environment variables
        run: |
          nvidia-smi
          nvidia-smi -L
          nvcc --version
          echo "CUDA_ARCH=86,89,120" >> $GITHUB_ENV
          echo "NEXTEST_ENV=CUDA_OPT_LEVEL=3" >> $GITHUB_ENV
          echo "FEATURE_ARGS=--features=cuda" >> $GITHUB_ENV
          echo "VPMM_PAGES=1" >> $GITHUB_ENV

      - name: Run RISC-V tests
        if: matrix.group == 'riscv'
        working-directory: extensions/riscv
        run: |
          pushd circuit
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass
          popd
          pushd tests
          "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast ${{ env.FEATURE_ARGS }} --profile=heavy --no-tests=pass
          popd

      - name: Run Keccak-256 tests
        if: matrix.group == 'extensions' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.keccak256 == 'true')
        working-directory: extensions/keccak256/circuit
        run: |
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass

      - name: Run SHA-2 tests
        if: matrix.group == 'extensions' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.sha2 == 'true')
        working-directory: extensions/sha2/circuit
        run: |
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass

      - name: Run bigint tests
        if: matrix.group == 'extensions' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.bigint == 'true')
        working-directory: extensions/bigint/circuit
        run: |
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass

      - name: Run algebra tests
        if: matrix.group == 'extensions' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.algebra == 'true')
        working-directory: extensions/algebra
        run: |
          pushd circuit
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass
          popd
          pushd tests
          "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast ${{ env.FEATURE_ARGS }} --profile=heavy --no-tests=pass
          popd

      - name: Run ECC tests
        if: matrix.group == 'extensions' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.ecc == 'true')
        working-directory: extensions/ecc
        run: |
          pushd circuit
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass
          popd
          pushd tests
          "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast ${{ env.FEATURE_ARGS }} --profile=heavy --no-tests=pass
          popd

      - name: Run pairing tests
        if: matrix.group == 'extensions' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.pairing == 'true')
        working-directory: extensions/pairing/circuit
        run: |
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass

      - name: Run deferral tests
        if: matrix.group == 'extensions' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.deferral == 'true')
        working-directory: extensions/deferral
        run: |
          pushd circuit
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass
          popd
          pushd tests
          "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"
          ${{ env.NEXTEST_ENV }} cargo nextest run --cargo-profile=fast ${{ env.FEATURE_ARGS }} --profile=heavy --no-tests=pass
          popd

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
