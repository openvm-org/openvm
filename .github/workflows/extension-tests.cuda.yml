name: Extension Tests (CUDA)

on:
  workflow_call:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
    paths:
#     - "crates/circuits/**"
#     - "crates/vm/**"
#     - "crates/toolchain/**"
      - "extensions/**"
#     - "Cargo.toml"
      - ".github/workflows/extension-tests.cuda.yml"
  workflow_dispatch:
    inputs:
      machine_type:
        description: "Runner label fragment (e.g. image=ubuntu24-gpu-x64/family=g7e.*+g7.*+g6e.*/cpu=8+16/ram=64/volume=40gb/spot=capacity-optimized)"
        required: false
        default: image=ubuntu24-gpu-x64/family=g7e.*+g7.*+g6e.*/cpu=8+16/ram=64/volume=40gb/spot=capacity-optimized

concurrency:
  group: ${{ github.workflow_ref }}-extension-tests-cuda-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  extension-tests-cuda:
    strategy:
      matrix:
        extensions: # group extensions on the same runner based on test time
          - "riscv"
          - "keccak256 sha2 bigint algebra ecc pairing deferral"
    runs-on:
      - runs-on=${{ github.run_id }}-extension-tests-cuda-${{ github.run_attempt }}-${{ strategy.job-index }}/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.machine_type || 'image=ubuntu24-gpu-x64/family=g7e.*+g7.*+g6e.*/cpu=8+16/ram=64/volume=40gb/spot=capacity-optimized' }}/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            common:
              - "crates/circuits/**"
              - "crates/vm/**"
              - "crates/toolchain/**"
              - ".github/workflows/extension-tests.cuda.yml"
            riscv:
              - "extensions/riscv/**"
            keccak256:
              - "extensions/keccak256/**"
            sha2:
              - "extensions/sha2/**"
            bigint:
              - "extensions/bigint/**"
            algebra:
              - "extensions/algebra/**"
            ecc:
              - "extensions/ecc/**"
            pairing:
              - "extensions/pairing/**"
            deferral:
              - "extensions/deferral/**"

      - name: Skip if no changes
        env:
          FILTER_OUTPUTS: ${{ toJSON(steps.filter.outputs) }}
        run: |
          # Check if common files changed
          COMMON_CHANGED=$(echo $FILTER_OUTPUTS | jq -r .common)

          # Check if any extension in the current matrix group changed
          ANY_EXT_CHANGED=false
          for ext in ${{ matrix.extensions }}; do
            ext_changed=$(echo $FILTER_OUTPUTS | jq -r --arg ext "$ext" '.[$ext]')
            if [[ "$ext_changed" == "true" ]]; then
              ANY_EXT_CHANGED=true
              break
            fi
          done

          # Skip if neither common nor any extension in this matrix group changed
          if [[ "$COMMON_CHANGED" != "true" && "$ANY_EXT_CHANGED" != "true" ]]; then
            echo "No relevant changes for extensions [${{ matrix.extensions }}], skipping tests."
            exit 0
          fi

      - uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_PERMIT_COPY_RENAME: "1"
      - uses: ./.github/actions/sccache

      # TODO: remove once https://github.com/runs-on/runner-images-for-aws/issues/55 is fixed
      - name: Setup GPU driver
        run: bash ./scripts/gpu_driver_setup.sh

      - uses: ./.github/actions/rust-cache-cuda
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest

      - name: Check CUDA status and set environment variables
        run: |
          nvidia-smi
          nvidia-smi -L
          nvcc --version
          echo "CUDA_ARCH=86,89,120" >> $GITHUB_ENV
          echo "NEXTEST_ENV=CUDA_OPT_LEVEL=3" >> $GITHUB_ENV
          echo "FEATURE_ARGS=--features=cuda" >> $GITHUB_ENV
          echo "VPMM_PAGES=1" >> $GITHUB_ENV

      - name: Run extension tests
        env:
          FILTER_OUTPUTS: ${{ toJSON(steps.filter.outputs) }}
        run: |
          COMMON_CHANGED=$(echo $FILTER_OUTPUTS | jq -r .common)

          for ext in ${{ matrix.extensions }}; do
            ext_changed=$(echo $FILTER_OUTPUTS | jq -r --arg ext "$ext" '.[$ext]')
            if [[ "$COMMON_CHANGED" == "true" || "$ext_changed" == "true" ]]; then
              echo "::group::Running tests for $ext"

              # Run circuit tests
              if [ -d "extensions/$ext/circuit" ]; then
                pushd extensions/$ext/circuit
                ${{ env.NEXTEST_ENV }} cargo nextest run cuda ${{ env.FEATURE_ARGS }} --features=touchemall --profile=heavy --no-tests=pass
                popd
              fi

              # Run integration tests
              if [ -d "extensions/$ext/tests" ]; then
                pushd extensions/$ext/tests
                "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"
                ${{ env.NEXTEST_ENV }} cargo nextest run ${{ env.FEATURE_ARGS }} --profile=heavy --no-tests=pass
                popd
              fi
              echo "::endgroup::"
            else
              echo "Skipping tests for $ext as no relevant files changed."
            fi
          done

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
