name: Extension Tests (CUDA)

on:
  workflow_call:
  push:
    branches: ["main"]
    paths: &extension_cuda_test_paths
      - "crates/circuits/**"
      - "crates/vm/**"
      - "crates/toolchain/**"
      - "crates/sdk/**"
      - "crates/sdk-config/**"
      - "crates/rvr/**"
      - "extensions/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/config.toml"
      - ".github/actions/sccache/**"
      - ".github/actions/rust-cache-cuda/**"
      - ".github/filters/extension-tests.yml"
      - ".github/workflows/extension-tests.cuda*.yml"
      - "ci/install-openvm-toolchain.sh"
      - "scripts/gpu_driver_setup.sh"
  pull_request:
    branches: ["**"]
    paths: *extension_cuda_test_paths
  workflow_dispatch:
    inputs:
      machine_type:
        description: "Runner label fragment (e.g. image=ubuntu24-gpu-x64/family=g7.2xlarge+g6.2xlarge+g5.2xlarge/volume=40gb/spot=price-capacity-optimized)"
        required: false
        default: image=ubuntu24-gpu-x64/family=g7.2xlarge+g6.2xlarge+g5.2xlarge/volume=40gb/spot=price-capacity-optimized

concurrency:
  group: ${{ github.workflow_ref }}-extension-tests-cuda-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  changes:
    name: Select CUDA extension tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      cuda: ${{ steps.tests.outputs.cuda }}
      riscv: ${{ steps.tests.outputs.riscv }}
      keccak256: ${{ steps.tests.outputs.keccak256 }}
      sha2: ${{ steps.tests.outputs.sha2 }}
      bigint: ${{ steps.tests.outputs.bigint }}
      algebra: ${{ steps.tests.outputs.algebra }}
      ecc: ${{ steps.tests.outputs.ecc }}
      pairing: ${{ steps.tests.outputs.pairing }}
      deferral: ${{ steps.tests.outputs.deferral }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: tests
        with:
          filters: .github/filters/extension-tests.yml

  riscv-cuda:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.cuda == 'true' || needs.changes.outputs.riscv == 'true'
    uses: ./.github/workflows/extension-tests.cuda.group.yml
    with:
      group: riscv
      machine_type: ${{ inputs.machine_type || 'image=ubuntu24-gpu-x64/family=g7.2xlarge+g6.2xlarge+g5.2xlarge/volume=40gb/spot=price-capacity-optimized' }}
      riscv: true
    secrets: inherit

  extensions-cuda:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.cuda == 'true' ||
      needs.changes.outputs.keccak256 == 'true' ||
      needs.changes.outputs.sha2 == 'true' ||
      needs.changes.outputs.bigint == 'true' ||
      needs.changes.outputs.algebra == 'true' ||
      needs.changes.outputs.ecc == 'true' ||
      needs.changes.outputs.pairing == 'true' ||
      needs.changes.outputs.deferral == 'true'
    uses: ./.github/workflows/extension-tests.cuda.group.yml
    with:
      group: extensions
      machine_type: ${{ inputs.machine_type || 'image=ubuntu24-gpu-x64/family=g7.2xlarge+g6.2xlarge+g5.2xlarge/volume=40gb/spot=price-capacity-optimized' }}
      keccak256: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.cuda == 'true' || needs.changes.outputs.keccak256 == 'true' }}
      sha2: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.cuda == 'true' || needs.changes.outputs.sha2 == 'true' }}
      bigint: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.cuda == 'true' || needs.changes.outputs.bigint == 'true' }}
      algebra: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.cuda == 'true' || needs.changes.outputs.algebra == 'true' }}
      ecc: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.cuda == 'true' || needs.changes.outputs.ecc == 'true' }}
      pairing: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.cuda == 'true' || needs.changes.outputs.pairing == 'true' }}
      deferral: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.cuda == 'true' || needs.changes.outputs.deferral == 'true' }}
    secrets: inherit
