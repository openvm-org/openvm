name: Primitives Tests

on:
  workflow_call:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
    paths:
      - "crates/circuits/primitives/**"
      - "crates/circuits/poseidon2-air/**"
      - "crates/circuits/sha2-air/**"
      - "crates/circuits/mod-builder/**"
      - "crates/toolchain/instructions/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/primitives.yml"

concurrency:
  group: ${{ github.workflow_ref }}-primitives-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: CPU (parallel)

    runs-on:
      - runs-on=${{ github.run_id }}-primitives-${{ github.run_attempt }}/family=c9g.8xlarge+c8g.8xlarge+m9g.8xlarge+m8g.8xlarge/image=ubuntu24-full-arm64/volume=80gb/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - run: | # avoid cross-device link error
          rustup component remove clippy || true
          rm -rf ~/.rustup/toolchains/stable-x86_64-unknown-linux-gnu || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/sccache
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest

      - name: Run tests for primitives
        working-directory: crates/circuits/primitives
        run: cargo nextest run --cargo-profile fast --features parallel

      - name: Run tests for poseidon2-air
        working-directory: crates/circuits/poseidon2-air
        run: cargo nextest run --cargo-profile fast --features parallel

      # sha2-air has no tests; skipping to avoid upstream openvm-cpu-backend parallel compilation issue
      # - name: Run tests for sha2-air
      #   working-directory: crates/circuits/sha2-air
      #   run: cargo nextest run --cargo-profile fast --features parallel

      - name: Run tests for mod-builder
        working-directory: crates/circuits/mod-builder
        run: cargo nextest run --cargo-profile fast --features parallel

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
