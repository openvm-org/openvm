name: Guest Library Tests

on:
  workflow_call:
  push:
    branches: ["main"]
    paths: &guest_lib_test_paths
      - "crates/circuits/**"
      - "crates/vm/**"
      - "crates/toolchain/**"
      - "crates/sdk/**"
      - "crates/recursion/**"
      - "crates/continuations/**"
      - "crates/verify/**"
      - "crates/rvr/**"
      - "extensions/riscv/**"
      - "extensions/riscv-adapters/**"
      - "extensions/deferral/**"
      - "extensions/keccak256/**"
      - "extensions/sha2/**"
      - "extensions/algebra/**"
      - "extensions/ecc/**"
      - "extensions/pairing/**"
      - "guest-libs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/config.toml"
      - ".github/actions/sccache/**"
      - ".github/filters/guest-lib-tests.yml"
      - ".github/workflows/guest-lib-tests.yml"
      - "crates/sdk/guest/fib/**"
      - "ci/install-openvm-toolchain.sh"
  pull_request:
    branches: ["**"]
    paths: *guest_lib_test_paths

concurrency:
  group: ${{ github.workflow_ref }}-guest-lib-tests-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  changes:
    name: Select guest library tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      crates: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: .github/filters/guest-lib-tests.yml

  integration-tests:
    needs: changes
    if: needs.changes.outputs.crates != '[]'
    name: ${{ format('{0} ({1})', matrix.crate, matrix.mode) }}
    strategy:
      matrix:
        crate: ${{ fromJSON(needs.changes.outputs.crates) }}
        mode: [default, rvr]
        exclude:
          - { crate: shared, mode: default }
          - { crate: shared, mode: rvr }
          - { crate: cuda, mode: default }
          - { crate: cuda, mode: rvr }
          - { crate: verify-stark, mode: rvr }
      # Ensure tests run in parallel even if one fails
      fail-fast: false

    runs-on:
      - runs-on=${{ github.run_id }}-guest-lib-tests-${{ github.run_attempt }}-${{ strategy.job-index }}/family=c8i-flex.16xlarge+c8i.16xlarge+c8a.16xlarge+c7i.16xlarge+c7a.16xlarge/image=ubuntu24-full-x64/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
      - name: Init rvr FFI submodules
        if: matrix.mode == 'rvr'
        run: |
          git submodule update --init --depth 1 extensions/keccak256/rvr/ffi/openssl
          git submodule update --init --depth 1 extensions/algebra/rvr/ffi/modular/secp256k1
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/sccache
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest

      - name: Install clang-22 and lld (required for rvr)
        if: matrix.mode == 'rvr'
        run: |
          sudo apt-get update
          sudo apt-get install -y lsb-release wget software-properties-common gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y lld

      - name: Run ${{ format('{0}-{1}', matrix.crate, matrix.mode) }} guest library tests
        working-directory: guest-libs/${{ matrix.crate == 'verify-stark' && 'verify-stark/circuit' || matrix.crate }}
        run: |
          "$GITHUB_WORKSPACE/ci/install-openvm-toolchain.sh"
          EXTRA_ARGS=()
          if [[ "${{ matrix.mode }}" == 'rvr' ]]; then
            if [[ "${{ matrix.crate }}" == "pairing" ]]; then
              EXTRA_ARGS+=(--features=bn254,bls12_381,rvr -E 'not test(fallback)')
            else
              EXTRA_ARGS+=(--features=rvr)
            fi
          elif [[ "${{ matrix.crate }}" == "pairing" ]]; then
            EXTRA_ARGS+=(--features=bn254,bls12_381 -E 'not test(fallback)')
          fi

          cargo nextest run --cargo-profile=fast "${EXTRA_ARGS[@]}" --no-tests=pass --test-threads=1

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
