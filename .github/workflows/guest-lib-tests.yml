name: Guest Library Tests

on:
  workflow_call:
  push:
    branches: ["main"]
    paths: &guest_lib_test_paths
      - "crates/circuits/**"
      - "crates/vm/**"
      - "crates/toolchain/**"
      - "crates/sdk/**"
      - "crates/recursion/**"
      - "crates/continuations/**"
      - "crates/verify/**"
      - "crates/rvr/**"
      - "extensions/riscv/**"
      - "extensions/riscv-adapters/**"
      - "extensions/deferral/**"
      - "extensions/keccak256/**"
      - "extensions/sha2/**"
      - "extensions/algebra/**"
      - "extensions/ecc/**"
      - "extensions/pairing/**"
      - "guest-libs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/config.toml"
      - ".github/actions/sccache/**"
      - ".github/filters/guest-lib-tests.yml"
      - ".github/workflows/guest-lib-tests.group.yml"
      - ".github/workflows/guest-lib-tests.yml"
      - "crates/sdk/guest/fib/**"
      - "ci/install-openvm-toolchain.sh"
  pull_request:
    branches: ["**"]
    paths: *guest_lib_test_paths

concurrency:
  group: ${{ github.workflow_ref }}-guest-lib-tests-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENVM_SKIP_DEBUG: "1"

jobs:
  changes:
    name: Select affected libraries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      crates: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: .github/filters/guest-lib-tests.yml

  integration-tests:
    needs: changes
    if: needs.changes.outputs.crates != '[]'
    name: ${{ format('{0} ({1})', matrix.crate, matrix.mode == 'rvr' && 'RVR' || matrix.mode) }}
    strategy:
      matrix:
        crate: ${{ fromJSON(needs.changes.outputs.crates) }}
        mode: [default, rvr]
        exclude:
          - { crate: shared, mode: default }
          - { crate: shared, mode: rvr }
          - { crate: cuda, mode: default }
          - { crate: cuda, mode: rvr }
          - { crate: verify-stark, mode: rvr }
      # Ensure tests run in parallel even if one fails
      fail-fast: false
    uses: ./.github/workflows/guest-lib-tests.group.yml
    with:
      runner_id: cpu-${{ strategy.job-index }}
      machine_type: family=c9g.4xlarge+c8g.4xlarge+m9g.4xlarge+m8g.4xlarge/image=ubuntu24-full-arm64/volume=80gb
      crates: ${{ matrix.crate }}
      mode: ${{ matrix.mode }}
    secrets: inherit
