name: OpenVM SDK Tests

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture to run on"
        type: choice
        options:
          - x86
          - arm
        default: x86
      family:
        description: "EC2 instance family (must match selected arch)"
        type: string
        default: "m7a.24xlarge"
  push:
    branches: ["main"]
  # pull_request:
  #   branches: ["**"]
  #   paths:
  #     - "crates/circuits/primitives/**"
  #     - "crates/vm/**"
  #     - "crates/toolchain/**"
  #     - "crates/sdk/**"
  #     - "Cargo.toml"
  #     - ".github/workflows/sdk.yml"

concurrency:
  group: ${{ github.workflow_ref }}-sdk-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    strategy:
      matrix:
        mode: ["default", "ignored"]
        # TODO(rvr): add "rvr" here once RV64 RVR support lands.

    runs-on:
      - runs-on=${{ github.run_id }}-sdk-${{ github.run_attempt }}-${{ strategy.job-index }}/family=${{ inputs.family || 'm7a.24xlarge' }}/image=${{ (inputs.arch || 'x86') == 'arm' && 'ubuntu24-full-arm64' || 'ubuntu24-full-x64' }}/disk=large/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Init rvr FFI submodules
        if: matrix.mode == 'rvr'
        run: |
          git submodule update --init --depth 1 extensions/keccak256/rvr/ffi/openssl
          git submodule update --init --depth 1 extensions/algebra/rvr/ffi/modular/secp256k1
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/sccache
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest
      - name: Install solc # svm should support arm64 linux
        run: (hash svm 2>/dev/null || cargo install --locked --version 0.2.23 svm-rs) && svm install 0.8.19 && solc --version

      - name: Install clang-22 and lld (required for rvr)
        if: matrix.mode == 'rvr'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y lld

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.3.5

      - name: Install architecture specific tools
        run: |
          source ci/scripts/utils.sh
          install_s5cmd

      - name: Setup halo2
        working-directory: crates/sdk
        run: |
          bash ../../scripts/trusted_setup_s3.sh

      - name: Run openvm-sdk contracts/ tests
        if: ${{ matrix.mode == 'default' }}
        working-directory: crates/sdk/contracts
        run: |
          forge fmt --check
          forge build --sizes
          forge test

      - name: Check IOpenVmHalo2Verifier.sol abi correctness
        if: ${{ matrix.mode == 'default' }}
        working-directory: crates/sdk/contracts
        run: |
          forge build
          jq -S '.abi' ./out/IOpenVmHalo2Verifier.sol/IOpenVmHalo2Verifier.json > compiled_abi.json
          jq -S . ./abi/IOpenVmHalo2Verifier.json > expected_abi_sorted.json
          diff -u expected_abi_sorted.json compiled_abi.json

      - name: Run openvm-sdk crate tests (${{ matrix.mode }})
        if: ${{ matrix.mode != 'ignored' }}
        working-directory: crates/sdk
        run: |
          export RUST_BACKTRACE=1
          export RUST_MIN_STACK=8388608
          # TODO(rvr): switch back to this feature-selection block when "rvr" mode is re-enabled.
          # FEATURES="parallel,root-prover,evm-verify"
          # if [[ "${{ matrix.mode }}" == "default" ]]; then
          #   : # no additional features
          # elif [[ "${{ matrix.mode }}" == "rvr" ]]; then
          #   FEATURES="$FEATURES,rvr"
          # else
          #   echo "Unknown matrix mode: ${{ matrix.mode }}" && exit 1
          # fi
          # CARGO_PROFILE_RELEASE_DEBUG_ASSERTIONS=true cargo nextest run --release --features "$FEATURES"
          CARGO_PROFILE_RELEASE_DEBUG_ASSERTIONS=true cargo nextest run --release --features parallel,root-prover,evm-verify

      - name: Build openvm-sdk examples
        if: ${{ matrix.mode == 'default' }}
        working-directory: crates/sdk
        run: |
          cargo build --release --examples --features parallel,root-prover,evm-verify

      - name: Run ignored tests
        if: ${{ matrix.mode == 'ignored' }}
        working-directory: crates/sdk
        # if: ${{ github.event_name == 'push' }}
        run: |
          CARGO_PROFILE_RELEASE_DEBUG_ASSERTIONS=true cargo nextest run --release --features parallel,root-prover,evm-verify --run-ignored=only --no-tests pass

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
