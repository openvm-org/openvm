name: OpenVM SDK Tests

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture to run on"
        type: choice
        options:
          - x86
          - arm
        default: x86
      family:
        description: "EC2 instance family (must match selected arch)"
        type: string
        default: "m7a.24xlarge"
      sweep_root:
        description: "Run SDK root parameter sweep instead of normal SDK crate tests"
        type: boolean
        default: false
      sweep_internal:
        description: "Run SDK internal parameter sweep instead of normal SDK crate tests"
        type: boolean
        default: false
      test_name:
        description: "Comma-separated test filters passed to --test-name"
        type: string
        default: ""
      num_samples:
        description: "Number of parameter samples passed to --num-samples"
        type: string
        default: ""
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow_ref }}-sdk-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    strategy:
      matrix:
        mode: ["default", "ignored", "aot"]

    runs-on:
      - runs-on=${{ github.run_id }}-sdk-${{ github.run_attempt }}-${{ strategy.job-index }}/family=${{ inputs.family || 'm7a.24xlarge' }}/image=${{ (inputs.arch || 'x86') == 'arm' && 'ubuntu24-full-arm64' || 'ubuntu24-full-x64' }}/volume=80gb/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/sccache
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest
      - name: Install solc # svm should support arm64 linux
        run: (hash svm 2>/dev/null || cargo install --locked --version 0.2.23 svm-rs) && svm install 0.8.19 && solc --version

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.0

      - name: Install architecture specific tools
        run: |
          source ci/scripts/utils.sh
          install_s5cmd

      - name: Setup halo2
        working-directory: crates/sdk
        run: |
          bash ../../scripts/trusted_setup_s3.sh

      - name: Run openvm-sdk contracts/ tests
        if: ${{ matrix.mode == 'default' }}
        working-directory: crates/sdk/contracts
        run: |
          forge fmt --check
          forge build --sizes
          forge test

      - name: Check IOpenVmHalo2Verifier.sol abi correctness
        if: ${{ matrix.mode == 'default' }}
        working-directory: crates/sdk/contracts
        run: |
          forge build
          jq -S '.abi' ./out/IOpenVmHalo2Verifier.sol/IOpenVmHalo2Verifier.json > compiled_abi.json
          jq -S . ./abi/IOpenVmHalo2Verifier.json > expected_abi_sorted.json
          diff -u expected_abi_sorted.json compiled_abi.json

      - name: Generate sweep JSON files if missing
        if: ${{ inputs.sweep_root || inputs.sweep_internal }}
        working-directory: crates/sdk
        run: |
          if [[ ! -f tests/internal_sweep_no_root.json || ! -f tests/internal_sweep_root.json ]]; then
            cargo nextest run --release --features parallel,root-prover,evm-verify -- generate_interesting_internal_params
          fi
          if [[ ! -f tests/root_params.json ]]; then
            cargo nextest run --release --features parallel,root-prover,evm-verify -- generate_interesting_root_params
          fi

      - name: Run openvm-sdk crate tests
        if: ${{ matrix.mode == 'default' }}
        working-directory: crates/sdk
        run: |
          export RUST_BACKTRACE=1
          export RUST_MIN_STACK=8388608
          export RUST_LOG=debug
          SWEEP_ARGS=("-j=1")
          LOGS=()
          SWEEP_EXIT=0
          if [[ -n "${{ inputs.test_name }}" ]]; then SWEEP_ARGS+=(--test-name "${{ inputs.test_name }}"); fi
          if [[ -n "${{ inputs.num_samples }}" ]]; then SWEEP_ARGS+=(--num-samples "${{ inputs.num_samples }}"); fi
          mkdir -p sweeps

          run_sweep() {
            local log_dir="$1"
            shift

            mkdir -p "$log_dir"
            LOGS+=("$log_dir")
            if ! CARGO_PROFILE_RELEASE_DEBUG_ASSERTIONS=true python3 tests/run_sdk_tests2.py --mode default --log-dir="$log_dir" "$@"; then
              SWEEP_EXIT=1
            fi
          }

          # The sweep JSON files are produced by crates/sdk/src/tests.rs
          if [[ "${{ inputs.sweep_internal || false }}" == "true" ]]; then
            run_sweep "sweeps/sweep_internal" "${SWEEP_ARGS[@]}" --test-indices=2,8,14,16,22,28,34 --sweep tests/internal_sweep_no_root.json
          fi
          if [[ "${{ inputs.sweep_root || false }}" == "true" ]]; then
            run_sweep "sweeps/sweep_root" "${SWEEP_ARGS[@]}" --use-evm --test-indices=2,3,4,6,7,8,9,24 --sweep tests/internal_sweep_root.json tests/root_params.json
          fi

          if [ ${#LOGS[@]} -eq 0 ]; then
            CARGO_PROFILE_RELEASE_DEBUG_ASSERTIONS=true cargo nextest run --release --features parallel,root-prover,evm-verify
          else
            if ! python3 tests/post_test_summarize.py -o "sweeps/ci_summary.md" --artifact-path-prefix="" --log-dirs "${LOGS[@]}"; then
              SWEEP_EXIT=1
            fi
            echo "$SWEEP_EXIT" > sweeps/sweep_exit_code
          fi

      - name: Build openvm-sdk examples
        if: ${{ matrix.mode == 'default' }}
        working-directory: crates/sdk
        run: |
          cargo build --release --examples --features parallel,root-prover,evm-verify

      - name: Run openvm-sdk crate tests (AOT)
        if: ${{ matrix.mode == 'aot' && (inputs.arch || 'x86') == 'x86' }}
        working-directory: crates/sdk
        run: |
          export RUST_BACKTRACE=1
          export RUST_MIN_STACK=8388608
          export RUST_LOG=debug
          SWEEP_ARGS=("-j=1")
          LOGS=()
          SWEEP_EXIT=0
          if [[ -n "${{ inputs.test_name }}" ]]; then SWEEP_ARGS+=(--test-name "${{ inputs.test_name }}"); fi
          if [[ -n "${{ inputs.num_samples }}" ]]; then SWEEP_ARGS+=(--num-samples "${{ inputs.num_samples }}"); fi
          mkdir -p sweeps

          run_sweep() {
            local log_dir="$1"
            shift

            mkdir -p "$log_dir"
            LOGS+=("$log_dir")
            if ! CARGO_PROFILE_RELEASE_DEBUG_ASSERTIONS=true python3 tests/run_sdk_tests2.py --mode aot --log-dir="$log_dir" "$@"; then
              SWEEP_EXIT=1
            fi
          }

          # The sweep JSON files are produced by crates/sdk/src/tests.rs
          if [[ "${{ inputs.sweep_internal || false }}" == "true" ]]; then
            run_sweep "sweeps/sweep_internal" "${SWEEP_ARGS[@]}" --test-indices=2,8,34 --sweep tests/internal_sweep_no_root.json
          fi
          if [[ "${{ inputs.sweep_root || false }}" == "true" ]]; then
            run_sweep "sweeps/sweep_root" "${SWEEP_ARGS[@]}" --use-evm --test-indices=2,24 --sweep tests/internal_sweep_root.json tests/root_params.json
          fi

          if [ ${#LOGS[@]} -eq 0 ]; then
            CARGO_PROFILE_RELEASE_DEBUG_ASSERTIONS=true cargo nextest run --release --features parallel,root-prover,evm-verify,aot
          else
            if ! python3 tests/post_test_summarize.py -o "sweeps/ci_summary.md" --artifact-path-prefix="" --log-dirs "${LOGS[@]}"; then
              SWEEP_EXIT=1
            fi
            echo "$SWEEP_EXIT" > sweeps/sweep_exit_code
          fi

      - name: Run ignored tests
        if: ${{ matrix.mode == 'ignored' }}
        working-directory: crates/sdk
        # if: ${{ github.event_name == 'push' }}
        run: |
          export RUST_LOG=debug
          SWEEP_ARGS=("-j=1")
          LOGS=()
          SWEEP_EXIT=0
          if [[ -n "${{ inputs.test_name }}" ]]; then SWEEP_ARGS+=(--test-name "${{ inputs.test_name }}"); fi
          if [[ -n "${{ inputs.num_samples }}" ]]; then SWEEP_ARGS+=(--num-samples "${{ inputs.num_samples }}"); fi
          mkdir -p sweeps

          run_sweep() {
            local log_dir="$1"
            shift

            mkdir -p "$log_dir"
            LOGS+=("$log_dir")
            if ! CARGO_PROFILE_RELEASE_DEBUG_ASSERTIONS=true python3 tests/run_sdk_tests2.py --mode ignored --log-dir="$log_dir" "$@"; then
              SWEEP_EXIT=1
            fi
          }

          # The sweep JSON files are produced by crates/sdk/src/tests.rs
          if [[ "${{ inputs.sweep_internal || false }}" == "true" ]]; then
            run_sweep "sweeps/sweep_internal" "${SWEEP_ARGS[@]}" --test-indices=2,8,14,16,22,28,34 --sweep tests/internal_sweep_no_root.json
          fi
          if [[ "${{ inputs.sweep_root || false }}" == "true" ]]; then
            run_sweep "sweeps/sweep_root" "${SWEEP_ARGS[@]}" --use-evm --test-indices=2,3,4,6,7,8,9,24 --sweep tests/internal_sweep_root.json tests/root_params.json
          fi

          if [ ${#LOGS[@]} -eq 0 ]; then
            CARGO_PROFILE_RELEASE_DEBUG_ASSERTIONS=true cargo nextest run --release --features parallel,root-prover,evm-verify --run-ignored=only --no-tests pass
          else
            if ! python3 tests/post_test_summarize.py -o "sweeps/ci_summary.md" --artifact-path-prefix="" --log-dirs "${LOGS[@]}"; then
              SWEEP_EXIT=1
            fi
            echo "$SWEEP_EXIT" > sweeps/sweep_exit_code
          fi


      - name: Upload SDK sweep artifacts
        id: upload-sdk-sweep
        if: ${{ always() && (inputs.sweep_root || inputs.sweep_internal) && (matrix.mode != 'aot' || (inputs.arch || 'x86') == 'x86') }}
        uses: actions/upload-artifact@v4
        with:
          name: sdk-sweep-${{ matrix.mode }}
          if-no-files-found: ignore
          path: |
            crates/sdk/sweeps/**

      - name: Publish SDK sweep summary
        if: ${{ always() && (inputs.sweep_root || inputs.sweep_internal) && (matrix.mode != 'aot' || (inputs.arch || 'x86') == 'x86') }}
        working-directory: crates/sdk
        run: |
          CI_SUMMARY_PATH="$(find sweeps -name ci_summary.md -print 2>/dev/null | sort | tail -n 1)"
          if [[ -n "$CI_SUMMARY_PATH" ]]; then
            LOG_DIR="$(dirname "$CI_SUMMARY_PATH")"
            echo "Logs are uploaded in the [sdk-sweep-${{ matrix.mode }}](${{ steps.upload-sdk-sweep.outputs.artifact-url }}) artifact under \`$LOG_DIR\`." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat "$CI_SUMMARY_PATH" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No SDK sweep summary was generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Fail SDK sweep if needed
        if: ${{ always() && (inputs.sweep_root || inputs.sweep_internal) && (matrix.mode != 'aot' || (inputs.arch || 'x86') == 'x86') }}
        working-directory: crates/sdk
        run: |
          if [[ ! -f sweeps/sweep_exit_code ]]; then
            echo "SDK sweep status file missing."
            exit 1
          fi

          SWEEP_EXIT="$(cat sweeps/sweep_exit_code)"
          if [[ "$SWEEP_EXIT" != "0" ]]; then
            echo "One or more SDK sweeps failed."
            exit "$SWEEP_EXIT"
          fi
