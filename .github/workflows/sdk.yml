name: SDK Tests

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture to run on"
        type: choice
        options:
          - x86
          - arm
        default: x86
      family:
        description: "EC2 instance family (must match selected arch)"
        type: string
        default: "m8a.24xlarge+m8i.24xlarge"
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["**"]

concurrency:
  group: sdk-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    name: ${{ matrix.mode == 'aot' && 'AOT' || matrix.mode }}
    if: ${{ github.event_name != 'pull_request' || (contains(github.event.pull_request.labels.*.name, 'run-sdk-tests') && (github.event.action != 'labeled' || github.event.label.name == 'run-sdk-tests')) }}
    strategy:
      matrix:
        mode: ["default", "ignored", "aot"]

    runs-on:
      - runs-on=${{ github.run_id }}-sdk-${{ github.run_attempt }}-${{ strategy.job-index }}/family=${{ inputs.family || 'm8a.24xlarge+m8i.24xlarge' }}/image=${{ (inputs.arch || 'x86') == 'arm' && 'ubuntu24-full-arm64' || 'ubuntu24-full-x64' }}/volume=80gb/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/sccache
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest
      - name: Install solc # svm should support arm64 linux
        run: (hash svm 2>/dev/null || cargo install --locked --version 0.2.23 svm-rs) && svm install 0.8.19 && solc --version

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.0

      - name: Install architecture specific tools
        run: |
          source ci/scripts/utils.sh
          install_s5cmd

      - name: Setup halo2
        working-directory: crates/sdk
        run: |
          bash ../../scripts/trusted_setup_s3.sh

      - name: Run openvm-sdk contracts/ tests
        if: ${{ matrix.mode == 'default' }}
        working-directory: crates/sdk/contracts
        run: |
          forge build --sizes
          forge test

      - name: Check IOpenVmHalo2Verifier.sol abi correctness
        if: ${{ matrix.mode == 'default' }}
        working-directory: crates/sdk/contracts
        run: |
          forge build
          jq -S '.abi' ./out/IOpenVmHalo2Verifier.sol/IOpenVmHalo2Verifier.json > compiled_abi.json
          jq -S . ./abi/IOpenVmHalo2Verifier.json > expected_abi_sorted.json
          diff -u expected_abi_sorted.json compiled_abi.json

      - name: Run openvm-sdk crate tests
        if: ${{ matrix.mode == 'default' }}
        working-directory: crates/sdk
        run: |
          export RUST_BACKTRACE=1
          export RUST_MIN_STACK=8388608
          CARGO_PROFILE_RELEASE_DEBUG_ASSERTIONS=true cargo nextest run --release --features parallel,root-prover,evm-verify

      - name: Build openvm-sdk examples
        if: ${{ matrix.mode == 'default' }}
        working-directory: crates/sdk
        run: |
          cargo build --release --examples --features parallel,root-prover,evm-verify

      - name: Run openvm-sdk crate tests (AOT)
        if: ${{ matrix.mode == 'aot' && (inputs.arch || 'x86') == 'x86' }}
        working-directory: crates/sdk
        run: |
          export RUST_BACKTRACE=1
          export RUST_MIN_STACK=8388608
          CARGO_PROFILE_RELEASE_DEBUG_ASSERTIONS=true cargo nextest run --release --features parallel,root-prover,evm-verify,aot

      - name: Run ignored tests
        if: ${{ matrix.mode == 'ignored' }}
        working-directory: crates/sdk
        # if: ${{ github.event_name == 'push' }}
        run: |
          CARGO_PROFILE_RELEASE_DEBUG_ASSERTIONS=true cargo nextest run --release --features parallel,root-prover,evm-verify --run-ignored=only --no-tests pass

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
