[package]
name = "openvm-ecdsa-recover-key-program"
version.workspace = true
edition.workspace = true

[dependencies]
openvm = { workspace = true }
openvm-algebra-guest.workspace = true
openvm-ecc-guest.workspace = true
openvm-keccak256.workspace = true
revm-precompile = { git = "https://github.com/bluealloy/revm.git", tag = "v75", default-features = false }
# IMPORTANT: must be same version as used by revm; revm does not re-export this feature so we enable it here
alloy-primitives = { version = "1.2.0", default-features = false, features = [
    "native-keccak",
] }
k256 = { version = "0.13.3", default-features = false }

# `bytes` (pulled transitively) uses atomic CAS via `core::sync::atomic`. On
# guest targets that lack the A extension, activate `bytes/extra-platforms` to
# route CAS through `portable-atomic`; the `critical-section` backend on
# `portable-atomic` is provided by `openvm-platform`.
[target.'cfg(all(target_arch = "riscv64", target_os = "none", not(target_feature = "a")))'.dependencies]
bytes = { version = "1.11.1", default-features = false, features = ["extra-platforms"] }

[features]
default = []
std = ["openvm/std"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(openvm_intrinsics)'] }
