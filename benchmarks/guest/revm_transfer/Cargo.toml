[package]
name = "openvm-revm-transfer"
version.workspace = true
edition.workspace = true

[dependencies]
openvm = { workspace = true }
openvm-algebra-guest.workspace = true
openvm-ecc-guest.workspace = true
openvm-keccak256.workspace = true
revm = { version = "18.0.0", default-features = false }
tracing = { version = "0.1.40", default-features = false }
alloy-primitives = { version = "0.8.10", default-features = false, features = [
    "native-keccak",
] }
# revm does not re-export this feature so we enable it here
derive_more = { version = "1.0.0", default-features = false, features = [
    "from",
    "display",
] }

# On guest targets lacking the A extension, route transitive CAS consumers
# through `portable-atomic` (which `openvm-platform` backs with
# `critical-section`): `bytes` via `extra-platforms`, and the legacy
# `spin 0.9` pulled in by `lazy_static` via `portable_atomic`.
[target.'cfg(all(target_arch = "riscv64", target_os = "none", not(target_feature = "a")))'.dependencies]
bytes = { version = "1.11.1", default-features = false, features = ["extra-platforms"] }
spin = { version = "0.9", default-features = false, features = ["portable_atomic", "spin_mutex"] }

[features]
default = []
std = ["openvm/std"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(openvm_intrinsics)'] }
