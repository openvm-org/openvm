# Nextest configuration for OpenVM project

# Define test groups with different weights
[[profile.default.overrides]]
# Match all tests with "persistent" in their name
filter = 'test(~persistent)'
# Give these tests 5x the default weight because they use more memory
threads-required = 16

# CUDA tests each allocate 5-9 GiB GPU memory for the merkle tree,
# so they must run serially to avoid GPU OOM when run in parallel.
# Other tests are unaffected and still run with full parallelism.
[test-groups.cuda-serial]
max-threads = 1

[[profile.default.overrides]]
filter = 'package(openvm-ecc-circuit) & test(~cuda)'
test-group = 'cuda-serial'

# custom profile for heavy tests
[profile.heavy]
# Run fewer tests in parallel for heavy workloads
test-threads = 2
