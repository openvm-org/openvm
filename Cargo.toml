[workspace.package]
version = "2.0.1"
edition = "2021"
rust-version = "1.91.1"
authors = ["OpenVM Authors"]
homepage = "https://openvm.dev"
repository = "https://github.com/openvm-org/"
license = "MIT OR Apache-2.0"

[workspace]
members = [
  "benchmarks/utils",
  "benchmarks/execute",
  "benchmarks/prove",
  "crates/prof",
  "crates/cli",
  "crates/sdk",
  "crates/sdk-config",
  "crates/circuits/mod-builder",
  "crates/circuits/poseidon2-air",
  "crates/circuits/primitives",
  "crates/circuits/primitives/derive",
  "crates/toolchain/transpiler",
  "crates/toolchain/openvm",
  "crates/toolchain/build",
  "crates/toolchain/instructions",
  "crates/toolchain/instructions/derive",
  "crates/toolchain/macros",
  "crates/toolchain/platform",
  "crates/toolchain/tests",
  "crates/continuations",
  "crates/recursion",
  "crates/verify",
  "crates/vm",
  "extensions/rv32im/circuit",
  "extensions/rv32im/transpiler",
  "extensions/rv32im/guest",
  "extensions/rv32im/tests",
  "extensions/rv32-adapters",
  "extensions/algebra/circuit",
  "extensions/algebra/transpiler",
  "extensions/algebra/guest",
  "extensions/algebra/moduli-macros",
  "extensions/algebra/complex-macros",
  "extensions/algebra/tests",
  "extensions/bigint/circuit",
  "extensions/bigint/transpiler",
  "extensions/bigint/guest",
  "extensions/deferral/circuit",
  "extensions/deferral/guest",
  "extensions/deferral/transpiler",
  "extensions/deferral/tests",
  "extensions/keccak256/circuit",
  "extensions/keccak256/transpiler",
  "extensions/keccak256/guest",
  "extensions/sha2/circuit",
  "extensions/sha2/transpiler",
  "extensions/sha2/guest",
  "extensions/ecc/circuit",
  "extensions/ecc/transpiler",
  "extensions/ecc/guest",
  "extensions/ecc/sw-macros",
  "extensions/ecc/tests",
  "extensions/pairing/circuit",
  "extensions/pairing/guest",
  "guest-libs/ff_derive/",
  "guest-libs/k256/",
  "guest-libs/p256/",
  "guest-libs/keccak256/",
  "guest-libs/pairing/",
  "guest-libs/sha2/",
  "guest-libs/verify-stark/circuit",
  "guest-libs/verify-stark/guest",
  "crates/static-verifier",
  "scripts",
]
exclude = ["crates/sdk/example", "benchmarks/guest/**"]
resolver = "2"

# Fastest runtime configuration
[profile.release]
opt-level = 3
lto = "thin"
debug = "line-tables-only"
strip = true
panic = "unwind"
codegen-units = 16

[profile.profiling]
inherits = "release"
debug = 2
debug-assertions = false
strip = false

# Make sure debug symbols are in the bench profile for flamegraphs
[profile.bench]
inherits = "profiling"

# This will compile slowly
[profile.maxperf]
inherits = "release"
lto = "fat"
codegen-units = 1

[profile.dev]
opt-level = 1
debug = 2

# For O1 optimization but still fast(ish) compile times
[profile.fast]
inherits = "dev"
debug-assertions = true
# better recompile times
incremental = true
lto = "thin"

[workspace.dependencies]
# Stark Backend
openvm-stark-backend = { version = "2.0.0", git = "https://github.com/openvm-org/stark-backend.git", branch = "main", default-features = false }
openvm-stark-sdk = { version = "2.0.0", git = "https://github.com/openvm-org/stark-backend.git", branch = "main", default-features = false }
openvm-cpu-backend = { version = "2.0.0", git = "https://github.com/openvm-org/stark-backend.git", branch = "main", default-features = false }
openvm-cuda-backend = { version = "2.0.0", git = "https://github.com/openvm-org/stark-backend.git", branch = "main", default-features = false }
openvm-cuda-builder = { version = "2.0.0", git = "https://github.com/openvm-org/stark-backend.git", branch = "main", default-features = false }
openvm-cuda-common = { version = "2.0.0", git = "https://github.com/openvm-org/stark-backend.git", branch = "main", default-features = false }

# OpenVM
openvm-mod-circuit-builder = { version = "2.0.1", path = "crates/circuits/mod-builder", default-features = false }
openvm-poseidon2-air = { version = "2.0.1", path = "crates/circuits/poseidon2-air", default-features = false }
openvm-sha2-air = { version = "2.0.1", path = "crates/circuits/sha2-air", default-features = false }
openvm-circuit-primitives = { version = "2.0.1", path = "crates/circuits/primitives", default-features = false }
openvm-circuit-primitives-derive = { version = "2.0.1", path = "crates/circuits/primitives/derive", default-features = false }
openvm = { version = "2.0.1", path = "crates/toolchain/openvm", default-features = false }
openvm-build = { version = "2.0.1", path = "crates/toolchain/build", default-features = false }
openvm-instructions = { version = "2.0.1", path = "crates/toolchain/instructions", default-features = false }
openvm-instructions-derive = { version = "2.0.1", path = "crates/toolchain/instructions/derive", default-features = false }
openvm-macros-common = { version = "2.0.1", path = "crates/toolchain/macros", default-features = false }
openvm-platform = { version = "2.0.1", path = "crates/toolchain/platform", default-features = false }
openvm-transpiler = { version = "2.0.1", path = "crates/toolchain/transpiler", default-features = false }
openvm-custom-insn = { version = "2.0.1", path = "crates/toolchain/custom_insn", default-features = false }
openvm-circuit = { version = "2.0.1", path = "crates/vm", default-features = false }
openvm-circuit-derive = { version = "2.0.1", path = "crates/vm/derive", default-features = false }
openvm-recursion-circuit = { version = "2.0.1", path = "crates/recursion", default-features = false }
openvm-recursion-circuit-derive = { version = "2.0.1", path = "crates/recursion/derive", default-features = false }
openvm-continuations = { version = "2.0.1", path = "crates/continuations", default-features = false }
openvm-verify-stark-host = { version = "2.0.1", path = "crates/verify", default-features = false }
openvm-static-verifier = { version = "2.0.1", path = "crates/static-verifier", default-features = false }
openvm-sdk = { version = "2.0.1", path = "crates/sdk", default-features = false }
openvm-sdk-config = { version = "2.0.1", path = "crates/sdk-config", default-features = false }
cargo-openvm = { version = "2.0.1", path = "crates/cli", default-features = false }

# Extensions
