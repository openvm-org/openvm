openvm-rv32im-transpiler = { version = "2.0.1", path = "extensions/rv32im/transpiler", default-features = false }
openvm-rv32im-guest = { version = "2.0.1", path = "extensions/rv32im/guest", default-features = false }
openvm-rv32-adapters = { version = "2.0.1", path = "extensions/rv32-adapters", default-features = false }
openvm-keccak256-circuit = { version = "2.0.1", path = "extensions/keccak256/circuit", default-features = false }
openvm-keccak256-transpiler = { version = "2.0.1", path = "extensions/keccak256/transpiler", default-features = false }
openvm-keccak256-guest = { version = "2.0.1", path = "extensions/keccak256/guest", default-features = false }
openvm-sha2-circuit = { version = "2.0.1", path = "extensions/sha2/circuit", default-features = false }
openvm-sha2-transpiler = { version = "2.0.1", path = "extensions/sha2/transpiler", default-features = false }
openvm-sha2-guest = { version = "2.0.1", path = "extensions/sha2/guest", default-features = false }
openvm-bigint-circuit = { version = "2.0.1", path = "extensions/bigint/circuit", default-features = false }
openvm-bigint-transpiler = { version = "2.0.1", path = "extensions/bigint/transpiler", default-features = false }
openvm-bigint-guest = { version = "2.0.1", path = "extensions/bigint/guest", default-features = false }
openvm-algebra-circuit = { version = "2.0.1", path = "extensions/algebra/circuit", default-features = false }
openvm-algebra-transpiler = { version = "2.0.1", path = "extensions/algebra/transpiler", default-features = false }
openvm-algebra-guest = { version = "2.0.1", path = "extensions/algebra/guest", default-features = false }
openvm-algebra-moduli-macros = { version = "2.0.1", path = "extensions/algebra/moduli-macros", default-features = false }
openvm-algebra-complex-macros = { version = "2.0.1", path = "extensions/algebra/complex-macros", default-features = false }
openvm-ecc-circuit = { version = "2.0.1", path = "extensions/ecc/circuit", default-features = false }
openvm-ecc-transpiler = { version = "2.0.1", path = "extensions/ecc/transpiler", default-features = false }
openvm-ecc-guest = { version = "2.0.1", path = "extensions/ecc/guest", default-features = false }
