[package]
name = "keccak-example"
version = "0.0.0"
edition = "2021"

[workspace]
resolver = "2"
members = []

[dependencies]
openvm = { git = "https://github.com/openvm-org/openvm.git" }
tiny-keccak = { git = "https://github.com/openvm-org/tiny-keccak", default-features = false, features = ["keccak"] }
hex-literal = { version = "1.1.0", default-features = false }

[features]
default = []
std = ["openvm/std"]

# remove this if copying example outside of monorepo
[patch."https://github.com/openvm-org/openvm.git"]
openvm = { path = "../../crates/toolchain/openvm" }
openvm-keccak256-guest = { path = "../../extensions/keccak256/guest" }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(openvm_intrinsics)'] }
