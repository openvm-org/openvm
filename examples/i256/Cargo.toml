[package]
name = "i256-example"
version = "0.0.0"
edition = "2021"

[workspace]
resolver = "2"
members = []

[dependencies]
openvm = { git = "https://github.com/openvm-org/openvm.git" }
openvm-bigint-guest = { git = "https://github.com/openvm-org/openvm.git", features = [
    "export-intrinsics",
] }
alloy-primitives = { version = "1.1.2", default-features = false }

[features]
default = []
std = ["openvm/std", "alloy-primitives/std"]

[patch.crates-io]
# alloy-primitives uses ruint:
ruint = { git = "https://github.com/openvm-org/uint.git", branch = "v1.14.0-openvm" }

# remove this if copying example outside of monorepo
[patch."https://github.com/openvm-org/openvm.git"]
openvm = { path = "../../crates/toolchain/openvm" }
openvm-bigint-guest = { path = "../../extensions/bigint/guest" }

[profile.release]
lto = "thin"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(openvm_intrinsics)', 'cfg(target_os, values("openvm"))'] }
