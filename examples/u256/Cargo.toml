[package]
name = "u256-example"
version = "0.0.0"
edition = "2021"

[workspace]
resolver = "2"
members = []

[dependencies]
openvm = { git = "https://github.com/openvm-org/openvm.git" }
openvm-bigint-guest = { git = "https://github.com/openvm-org/openvm.git", features = [
    "export-intrinsics",
] }
openvm-ruint = { git = "https://github.com/openvm-org/uint.git", branch = "v1.14.0-openvm", package = "ruint", default-features = false }

[features]
default = []
std = ["openvm/std", "openvm-ruint/std"]

# remove this if copying example outside of monorepo
[patch."https://github.com/openvm-org/openvm.git"]
openvm = { path = "../../crates/toolchain/openvm" }
openvm-bigint-guest = { path = "../../extensions/bigint/guest" }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(openvm_intrinsics)'] }
