[package]
name = "u256-example"
version = "0.0.0"
edition = "2021"

[workspace]
members = []

[dependencies]
openvm = { git = "https://github.com/openvm-org/openvm.git", features = [
    "std",
] }
openvm-ruint = { git = "https://github.com/axiom-crypto/uint.git", branch = "v1.14.0-openvm", package = "ruint" }

[features]
